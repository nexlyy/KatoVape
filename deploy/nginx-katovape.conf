# nginx для KatoVape. Замени SUBDOMAIN на свой (напр. shop.mcrplanet.com).
# Кладём в /etc/nginx/sites-available/katovape, симлинк в sites-enabled, потом certbot.
# Не трогает default-конфиг и mcrplanet.com.
server {
    listen 80;
    listen [::]:80;
    server_name SUBDOMAIN;

    # статика мини-приложения, витрин и админки
    root /opt/katovape/site;
    index index.html;

    # API и вебхук бота — на локальный Node-процесс
    location /api/ {
        proxy_pass http://127.0.0.1:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 4m;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300";
    }
}
# После установки:  sudo certbot --nginx -d SUBDOMAIN
# certbot сам добавит блок listen 443 ssl и редирект с 80.

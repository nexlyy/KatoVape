<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KatoVape · Админка</title>
<link rel="icon" type="image/png" href="../../data/photos/cat.png">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06090d;--panel:#0e151c;--panel2:#121b23;--line:#1e2b35;--line2:#2b3c48;
  --mint:#63f5cf;--ink:#eef6f6;--txt:#dbe7e9;--mut:#93a4af;--red:#ff6f8a;--disp:'Clash Display',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--mint)}
.wrap{max-width:1100px;margin:0 auto;padding:22px 20px 60px}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--disp);font-weight:600;font-size:20px;color:var(--ink)}
.brand img{width:36px;height:36px;border-radius:10px}
.brand em{font-style:normal;color:var(--mint)}
.who{font-size:13px;color:var(--mut)}.who b{color:var(--txt)}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--mint);color:#032019;border:none;border-radius:11px;padding:11px 18px;font-weight:700;font-size:13.5px}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt)}
.btn:focus-visible{outline:2px solid var(--mint);outline-offset:2px}
.login{max-width:420px;margin:12vh auto 0;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px 28px}
.login h1{font-family:var(--disp);font-weight:600;font-size:26px;color:var(--ink);margin-bottom:8px}
.login p{color:var(--mut);font-size:14px;line-height:1.6;margin-bottom:22px}
.tgwrap{display:flex;justify-content:center;min-height:40px}
.err{color:var(--red);font-size:13px;margin-top:14px;min-height:18px;line-height:1.5}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.stat b{font-family:var(--disp);font-size:26px;color:var(--mint);display:block}
.stat span{font-size:12.5px;color:var(--mut)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:9px 15px;font-size:13px;font-weight:600}
.tab.on{background:var(--mint);border-color:var(--mint);color:#032019}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.card h2{font-family:var(--disp);font-weight:600;font-size:16px;color:var(--ink);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
td{color:var(--txt)}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:rgba(99,245,207,.12);color:var(--mint)}
.tag.new{background:rgba(111,225,255,.14);color:#6fe1ff}
.muted{color:var(--mut)}
.tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
textarea,input{background:#0a1017;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:14px;width:100%}
textarea:focus,input:focus{outline:none;border-color:var(--mint)}
.hint{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.5}
.wrapscroll{overflow-x:auto}
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<script src="../../shared/config.js?v=4"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const CFG = window.KV_CONFIG || {};
const app = document.getElementById('app');
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fdate = s => { try { return new Date(s).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch { return s; } };

if (!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY) {
  app.innerHTML = '<div class="login"><h1>Админка</h1><p>Не задан Supabase в config.js.</p></div>';
  throw new Error('no supabase config');
}
const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, { auth: { persistSession: true, storageKey: 'kv_sb_auth', detectSessionInUrl: false } });
let me = null, tab = 'orders';

// ---- вход через Telegram (та же Edge Function, что и у мини-аппа) ----
function loginView(errText) {
  app.innerHTML = `<div class="login">
    <h1>KatoVape · Админка</h1>
    <p>Доступ только для менеджеров. Войдите через Telegram — ваш ID должен быть в списке администраторов.</p>
    <div class="tgwrap" id="tgwrap"></div>
    <div class="err" id="err">${errText ? esc(errText) : ''}</div>
  </div>`;
  if (CFG.TELEGRAM_BOT) {
    const s = document.createElement('script');
    s.async = true; s.src = 'https://telegram.org/js/telegram-widget.js?22';
    s.setAttribute('data-telegram-login', CFG.TELEGRAM_BOT); s.setAttribute('data-size', 'large');
    s.setAttribute('data-onauth', 'onTgAuth(user)'); s.setAttribute('data-request-access', 'write');
    document.getElementById('tgwrap').appendChild(s);
  } else {
    document.getElementById('err').textContent = 'В config.js не задан TELEGRAM_BOT.';
  }
}
window.onTgAuth = async (u) => {
  try {
    const res = await fetch(CFG.FUNCTIONS_URL.replace(/\/$/, '') + '/telegram-auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json', apikey: CFG.SUPABASE_ANON_KEY },
      body: JSON.stringify({ mode: 'widget', payload: u })
    });
    const out = await res.json().catch(() => ({}));
    if (!res.ok || !out.email || !out.otp) throw new Error(out.error || 'не удалось войти');
    const { error } = await sb.auth.verifyOtp({ email: out.email, token: out.otp, type: 'magiclink' });
    if (error) throw error;
    await afterLogin();
  } catch (e) { loginView(e.message || 'ошибка входа'); }
};
async function afterLogin() {
  const { data: { user } } = await sb.auth.getUser();
  const { data: ov, error } = await sb.rpc('admin_overview');
  if (error || !ov) return loginView('Этот аккаунт не в списке администраторов.');
  me = user; dashboard(ov);
}

// ---- дашборд ----
function dashboard(ov) {
  app.innerHTML = `
    <header>
      <div class="brand"><img src="../../data/photos/cat.png" alt="">KATO<em>VAPE</em> · админка</div>
      <div class="who">Вы: <b>${esc((me.user_metadata && (me.user_metadata.display_name || me.user_metadata.username)) || 'admin')}</b>
        <button class="btn ghost" id="logout" style="margin-left:10px">Выйти</button></div>
    </header>
    <div class="stats">
      <div class="stat"><b>${ov.orders}</b><span>заказов${ov.orders_new ? ' (' + ov.orders_new + ' новых)' : ''}</span></div>
      <div class="stat"><b>${ov.users}</b><span>пользователей</span></div>
      <div class="stat"><b>${ov.reservations || 0}</b><span>броней${ov.res_active ? ' (' + ov.res_active + ' актив.)' : ''}</span></div>
      <div class="stat"><b>${ov.waiting || 0}</b><span>ждут поступления</span></div>
      <div class="stat"><b>${ov.reviews || 0}</b><span>отзывов</span></div>
      <div class="stat"><b>${ov.bot_users}</b><span>в боте</span></div>
    </div>
    <div class="tabs" id="tabs">
      ${['orders:Заказы','reservations:Бронь','products:Ассортимент','customers:Клиенты','demand:Спрос','tools:Рассылка'].map(x=>{const[k,l]=x.split(':');return `<button class="tab ${k===tab?'on':''}" data-t="${k}">${l}</button>`}).join('')}
    </div>
    <div id="panel"></div>`;
  document.getElementById('logout').onclick = async () => { await sb.auth.signOut(); me = null; loginView(); };
  document.getElementById('tabs').onclick = e => { const b = e.target.closest('[data-t]'); if (b) { tab = b.dataset.t; renderTab(); } };
  renderTab();
}
async function renderTab() {
  const p = document.getElementById('panel'); if (!p) return;
  p.innerHTML = '<div class="card"><span class="muted">Загрузка…</span></div>';
  try {
    if (tab === 'orders') {
      const { data } = await sb.from('orders').select('*').order('id', { ascending: false }).limit(200);
      p.innerHTML = card('Заказы', table(['#','Дата','Город','Состав','Доставка','Контакты','Сумма','Статус',''],
        (data||[]).map(o => [o.id, fdate(o.created_at), o.city, esc(itemsStr(o.items)),
          esc((o.delivery||'') + (o.address ? ' · ' + o.address : '')), contactStr(o.contact),
          (o.sum||0) + ' zł', `<span class="tag ${o.status==='new'?'new':''}">${stRu(o.status)}</span>`, orderBtns(o)])));
      p.querySelectorAll('[data-ost]').forEach(b => b.onclick = async () => {
        b.disabled = true;
        await sb.from('orders').update({ status: b.dataset.ost, updated_at: new Date().toISOString() }).eq('id', +b.dataset.id);
        renderTab();
      });
    } else if (tab === 'customers') {
      const { data } = await sb.rpc('admin_customers');
      p.innerHTML = card('Клиенты', table(['Логин','Имя','Почта','Телефон','Telegram','Дата'],
        (data||[]).map(u => [esc(u.username||'—'), esc(u.display_name||''), esc(u.email||'—'), esc(u.phone||'—'),
          u.telegram_id ? (u.telegram_username ? '@'+esc(u.telegram_username) : u.telegram_id) : '—', fdate(u.created_at)])));
    } else if (tab === 'demand') {
      const { data } = await sb.from('demand').select('*').order('n', { ascending: false }).limit(100);
      p.innerHTML = card('Спрос', table(['Товар','Событие','Кол-во'], (data||[]).map(d => [esc(d.product_id), d.event, d.n])));
    } else if (tab === 'reservations') {
      const { data } = await sb.from('reservations').select('*').order('id', { ascending: false }).limit(300);
      p.innerHTML = card('Бронь', table(['#','Создана','Товар','Город','Дата выдачи','Тип','Статус','Telegram',''],
        (data||[]).map(r => [r.id, fdate(r.created_at), esc(r.product_name||r.product_id), r.city,
          r.reserve_date || '—', r.kind === 'reserve' ? 'бронь' : 'ждёт поступления',
          `<span class="tag ${r.status==='active'||r.status==='waiting'?'new':''}">${stRu(r.status)}</span>`,
          r.telegram_id||'—', resBtns(r)])));
      p.querySelectorAll('[data-rst]').forEach(b => b.onclick = async () => {
        b.disabled = true;
        await sb.from('reservations').update({ status: b.dataset.rst }).eq('id', +b.dataset.id);
        renderTab();
      });
    } else if (tab === 'products') {
      const city = window._padCity || 'katowice';
      const { data } = await sb.from('products').select('*').eq('city', city).order('id').order('flavor');
      const cities = ['katowice', 'gliwice', 'warszawa'];
      p.innerHTML = `<div class="card"><h2>Ассортимент · остатки и цены</h2>
        <div class="tools" style="margin-bottom:12px">
          ${cities.map(c => `<button class="btn ${c===city?'':'ghost'}" data-city="${c}">${c}</button>`).join('')}
          <button class="btn ghost" id="prsave">Сохранить изменения</button><span class="muted" id="prres"></span>
        </div>
        <div class="wrapscroll">${(data||[]).length ? `<table><thead><tr><th>Товар</th><th>Вкус</th><th>Цена, zł</th><th>Остаток, шт</th><th></th></tr></thead><tbody>${
          (data||[]).map((r,i) => `<tr data-i="${i}">
            <td>${esc(r.name || r.id)}<div class="muted" style="font-size:11px">${esc(r.id)}</div></td>
            <td>${esc(r.flavor || '—')}</td>
            <td><input data-f="price" value="${r.price==null?'':r.price}" style="width:76px"></td>
            <td><input data-f="qty" value="${r.qty==null?0:r.qty}" style="width:66px"></td>
            <td><button class="btn ghost" data-del="${i}" title="удалить">×</button></td></tr>`).join('')
        }</tbody></table>` : '<span class="muted">Пусто. База ассортимента ещё не заполнена (кнопка ниже добавит позиции).</span>'}</div>
        <div class="hint" style="margin:14px 0 8px">Новая позиция или вкус:</div>
        <div class="tools">
          <input id="np_id" placeholder="id (например hqd)" style="width:150px">
          <input id="np_name" placeholder="Название" style="width:150px">
          <input id="np_flavor" placeholder="Вкус" style="width:150px">
          <input id="np_price" placeholder="Цена" style="width:80px">
          <input id="np_qty" placeholder="Шт" style="width:70px">
          <button class="btn" id="np_add">Добавить</button>
        </div></div>`;
      const rows = data || [];
      p.querySelectorAll('[data-city]').forEach(b => b.onclick = () => { window._padCity = b.dataset.city; renderTab(); });
      p.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
        const r = rows[+b.dataset.del]; if (!r) return;
        if (!confirm('Удалить ' + r.id + (r.flavor ? ' / ' + r.flavor : '') + '?')) return;
        await sb.from('products').delete().match({ id: r.id, city: r.city, flavor: r.flavor });
        renderTab();
      });
      document.getElementById('prsave').onclick = async () => {
        const out = [];
        p.querySelectorAll('tr[data-i]').forEach(tr => {
          const r = rows[+tr.dataset.i]; if (!r) return;
          const price = tr.querySelector('[data-f="price"]').value.trim();
          const qty = tr.querySelector('[data-f="qty"]').value.trim();
          const np = price === '' ? null : +price, nq = qty === '' ? 0 : +qty;
          if (np !== r.price || nq !== r.qty)
            out.push({ id: r.id, city: r.city, flavor: r.flavor, name: r.name, brand: r.brand,
              category: r.category, nic: r.nic, price: np, qty: nq, updated_at: new Date().toISOString() });
        });
        if (!out.length) { document.getElementById('prres').textContent = 'Изменений нет'; return; }
        const { error } = await sb.from('products').upsert(out, { onConflict: 'id,city,flavor' });
        document.getElementById('prres').textContent = error ? 'Ошибка: ' + error.message : 'Сохранено ✓ (' + out.length + ')';
      };
      document.getElementById('np_add').onclick = async () => {
        const id = document.getElementById('np_id').value.trim(); if (!id) return;
        const { error } = await sb.from('products').upsert([{
          id, city, flavor: document.getElementById('np_flavor').value.trim(),
          name: document.getElementById('np_name').value.trim() || id,
          price: +document.getElementById('np_price').value || null,
          qty: +document.getElementById('np_qty').value || 0,
          updated_at: new Date().toISOString()
        }], { onConflict: 'id,city,flavor' });
        if (error) alert('Ошибка: ' + error.message); else renderTab();
      };
    } else if (tab === 'tools') {
      p.innerHTML = `
        <div class="card"><h2>Рассылка</h2>
          <textarea id="bctext" rows="4" placeholder="Текст рассылки всем, кто нажал /start у бота…"></textarea>
          <div class="tools" style="margin-top:12px"><button class="btn" id="bcsend">Отправить всем</button><span class="muted" id="bcres"></span></div>
          <div class="hint">Строка ставится в очередь, бот на сервере разошлёт её тем, кто запускал бота. Поддерживается HTML.</div>
        </div>
        <div class="card"><h2>Синхронизация ассортимента</h2>
          <div class="tools"><button class="btn ghost" id="syncbtn">Синхронизировать из Google Sheets</button><span class="muted" id="syncres"></span></div>
          <div class="hint">Ставит задание синка; бот тянет опубликованную CSV в базу и рассылает уведомления по броням. Нужен env KV_SHEETS_CSV на боте.</div>
        </div>`;
      document.getElementById('bcsend').onclick = async () => {
        const text = document.getElementById('bctext').value.trim(); if (!text) return;
        document.getElementById('bcres').textContent = 'Отправка…';
        const { error } = await sb.from('broadcasts').insert({ text, author: me.id });
        document.getElementById('bcres').textContent = error ? ('Ошибка: ' + error.message) : 'Поставлено в очередь ✓';
      };
      document.getElementById('syncbtn').onclick = async () => {
        document.getElementById('syncres').textContent = 'Задание поставлено…';
        const { error } = await sb.from('sync_jobs').insert({ requested_by: me.id });
        document.getElementById('syncres').textContent = error ? ('Ошибка: ' + error.message) : 'Синк запущен ботом ✓';
      };
    }
  } catch (e) { p.innerHTML = card('Ошибка', '<span class="muted">' + esc(e.message) + '</span>'); }
}
const ST_RU = { new: 'новый', confirmed: 'подтверждён', done: 'выдан', cancelled: 'отменён',
  active: 'активна', notified: 'напомнили', expired: 'истекла', waiting: 'ждёт' };
function stRu(s) { return ST_RU[s] || s || ''; }
function itemsStr(items) {
  return (items || []).map(i => typeof i === 'string' ? i : (i.name || i.id) + (i.flavor ? ' ' + i.flavor : '') + ' ×' + (i.n || 1)).join(', ');
}
function contactStr(c) {
  if (!c) return '—';
  const rows = [c.name, c.phone, c.email, c.paczkomat ? 'пачкомат ' + c.paczkomat : ''].filter(Boolean);
  return rows.map(esc).join('<br>') || '—';
}
function orderBtns(o) {
  if (o.status === 'new') return btnSt('ost', o.id, 'confirmed', 'Подтвердить') + btnSt('ost', o.id, 'cancelled', 'Отказ');
  if (o.status === 'confirmed') return btnSt('ost', o.id, 'done', 'Выдан') + btnSt('ost', o.id, 'cancelled', 'Отказ');
  return '';
}
function resBtns(r) {
  if (r.kind === 'reserve' && (r.status === 'active' || r.status === 'notified'))
    return btnSt('rst', r.id, 'done', 'Выдана') + btnSt('rst', r.id, 'cancelled', 'Отмена');
  return '';
}
function btnSt(kind, id, st, label) {
  return `<button class="btn ghost" style="padding:6px 10px;font-size:12px;margin:2px" data-${kind}="${st}" data-id="${id}">${label}</button>`;
}
function card(title, inner) { return `<div class="card"><h2>${esc(title)}</h2><div class="wrapscroll">${inner}</div></div>`; }
function table(head, rows) {
  if (!rows.length) return '<span class="muted">Пусто.</span>';
  return `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${
    rows.map(r=>`<tr>${r.map(c=>`<td>${c==null?'':c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

// ---- старт: есть сессия и админ? ----
(async function(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) { const { data: ov } = await sb.rpc('admin_overview'); if (ov) { const { data: { user } } = await sb.auth.getUser(); me = user; return dashboard(ov); } }
  loginView();
})();
</script>
</body>
</html>

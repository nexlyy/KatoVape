<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KatoVape · управление</title>
<link rel="icon" type="image/png" href="../../data/photos/cat.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14; --surface:#121821; --surface-2:#171f29; --field:#0e141b;
  --line:#212b36; --line-2:#2e3b48;
  --ink:#e9eff4; --ink-2:#b3c0cc; --muted:#7f8d9a;
  --accent:#5ff3d0; --accent-ink:#04120e; --accent-dim:rgba(95,243,208,.13);
  --ok:#4ade80; --warn:#f5b83d; --danger:#fb7185; --info:#67d9f5;
  --r:10px; --r-lg:14px;
  --z-nav:20; --z-bar:60; --z-toast:80;
  --t:170ms cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button,input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;background:none;border:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

/* ---- элементы управления ---- */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line-2);
  color:var(--ink);border-radius:var(--r);padding:9px 14px;font-weight:600;font-size:13px;
  transition:background var(--t),border-color var(--t),color var(--t),opacity var(--t)}
.btn:hover{background:#1d2733;border-color:#3a4957}
.btn:active{background:#161e28}
.btn[disabled]{opacity:.45;cursor:default}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.btn.primary:hover{background:#77f7d9;border-color:#77f7d9}
.btn.primary:active{background:#4ee0be}
.btn.quiet{background:transparent;border-color:transparent;color:var(--ink-2)}
.btn.quiet:hover{background:var(--surface-2);color:var(--ink)}
.btn.danger{color:var(--danger);border-color:transparent;background:transparent}
.btn.danger:hover{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.4)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
input,textarea{background:var(--field);border:1px solid var(--line);border-radius:var(--r);
  padding:9px 12px;width:100%;transition:border-color var(--t),background var(--t)}
input::placeholder,textarea::placeholder{color:var(--muted)}
input:hover,textarea:hover{border-color:var(--line-2)}
input:focus,textarea:focus{outline:none;border-color:var(--accent);background:#101821}
label.f{display:flex;flex-direction:column;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2)}
select{background:var(--field);border:1px solid var(--line);border-radius:var(--r);padding:9px 12px;
  transition:border-color var(--t)}
select:hover{border-color:var(--line-2)}
select:focus{outline:none;border-color:var(--accent)}

/* ---- вход ---- */
.auth{min-height:100dvh;display:grid;place-items:center;padding:24px}
.auth-box{width:min(380px,100%)}
.auth-mark{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.auth-mark img{width:34px;height:34px;border-radius:9px}
.auth-mark b{font-size:16px;font-weight:600}
.auth-mark span{color:var(--muted);font-size:13px}
.auth h1{font-size:19px;font-weight:600;margin-bottom:6px}
.auth p.lead{color:var(--muted);font-size:13px;margin-bottom:20px}
.auth form{display:flex;flex-direction:column;gap:12px}
.auth .btn.primary{justify-content:center;padding:11px}
.sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:18px 0 14px}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--line)}
.tgwrap{display:flex;justify-content:center;min-height:40px}
.msg{border-radius:var(--r);padding:9px 12px;font-size:12.5px;line-height:1.45;margin-top:12px}
.msg.err{background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.35);color:#ffa7b5}

/* ---- каркас ---- */
.shell{display:grid;grid-template-columns:212px 1fr;min-height:100dvh}
@media(max-width:820px){.shell{grid-template-columns:1fr}}
.side{border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column;
  position:sticky;top:0;height:100dvh;z-index:var(--z-nav)}
@media(max-width:820px){.side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}}
.brand{display:flex;align-items:center;gap:10px;padding:16px 16px 14px}
.brand img{width:30px;height:30px;border-radius:8px}
.brand b{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
.brand span{display:block;font-size:11.5px;color:var(--muted);font-weight:500}
.nav{display:flex;flex-direction:column;gap:2px;padding:6px 10px;flex:1}
@media(max-width:820px){.nav{flex-direction:row;overflow-x:auto;flex:none;padding:0 10px 10px;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}}
.nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;color:var(--ink-2);
  padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:500;white-space:nowrap;
  transition:background var(--t),color var(--t)}
.nav button:hover{background:var(--surface-2);color:var(--ink)}
.nav button.on{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav .count{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--muted);
  background:var(--surface-2);border-radius:99px;padding:1px 7px}
.nav button.on .count{background:rgba(4,18,14,.25);color:var(--accent)}
@media(max-width:820px){.nav .count{margin-left:6px}}
.who{border-top:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;gap:10px}
@media(max-width:820px){.who{display:none}}
.who-ava{width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--accent-ink);
  display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.who-ava img{width:100%;height:100%;object-fit:cover}
.who-name{flex:1;min-width:0}
.who-name b{display:block;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.who-name span{font-size:11px;color:var(--muted)}

.main{min-width:0;padding:22px clamp(16px,3vw,28px) 96px}
.head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.head h1{font-size:20px;font-weight:600;letter-spacing:-.01em}
.head p{color:var(--muted);font-size:13px}

/* сводка одной плотной строкой, без витринных плиток */
.summary{display:flex;flex-wrap:wrap;gap:2px 26px;padding:14px 0 18px;margin-bottom:18px;
  border-bottom:1px solid var(--line)}
.summary div{display:flex;align-items:baseline;gap:7px}
.summary b{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
.summary span{font-size:12.5px;color:var(--muted)}
.summary div.hot b{color:var(--accent)}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.panel + .panel{margin-top:14px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:13px 16px;border-bottom:1px solid var(--line)}
.panel-head h2{font-size:14px;font-weight:600}
.panel-body{padding:16px}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tools input{width:auto}

.scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;background:var(--surface);text-align:left;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--t)}
tbody tr:hover{background:var(--surface-2)}
td .sub{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
.num{font-variant-numeric:tabular-nums;white-space:nowrap}

.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;
  background:var(--surface-2);color:var(--ink-2);white-space:nowrap}
.pill.new{background:rgba(245,184,61,.14);color:var(--warn)}
.pill.ok{background:rgba(74,222,128,.13);color:var(--ok)}
.pill.live{background:var(--accent-dim);color:var(--accent)}
.pill.off{background:var(--surface-2);color:var(--muted)}

.empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}
.empty b{display:block;color:var(--ink-2);font-size:14px;font-weight:600;margin-bottom:5px}
.skeleton{padding:16px;display:flex;flex-direction:column;gap:9px}
.skeleton i{display:block;height:13px;border-radius:6px;background:linear-gradient(90deg,var(--surface-2),#1f2937,var(--surface-2));
  background-size:200% 100%;animation:sk 1.1s linear infinite}
.skeleton i:nth-child(2){width:78%}.skeleton i:nth-child(3){width:88%}.skeleton i:nth-child(4){width:64%}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}

/* ---- ассортимент ---- */
.item{border-bottom:1px solid var(--line);padding:14px 16px}
.item:last-of-type{border-bottom:none}
.item-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.item-top input{width:auto}
.i-name{flex:2;min-width:150px}.i-brand{flex:1;min-width:110px}.i-cat{flex:1;min-width:115px}
.i-nic{width:100px}.i-price{width:92px}
.item-id{font-size:11.5px;color:var(--muted);margin:7px 0 2px;font-variant-numeric:tabular-nums}
.flavs{display:flex;flex-direction:column}
.flav{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
.flav-n{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis}
.flav input{width:76px;text-align:center}
.flav .unit{font-size:12px;color:var(--muted)}
.add-flav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.add-flav input{width:auto}
.dirty input{border-color:var(--accent)}

/* панель несохранённых изменений */
.savebar{position:fixed;left:0;right:0;bottom:0;z-index:var(--z-bar);background:var(--surface);
  border-top:1px solid var(--line-2);padding:12px clamp(16px,3vw,28px);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:0 -12px 32px -18px rgba(0,0,0,.9);
  transform:translateY(110%);transition:transform var(--t)}
.savebar.show{transform:none}
.savebar b{font-size:13.5px;font-weight:600}
.savebar span{color:var(--muted);font-size:12.5px}
.savebar .grow{flex:1}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .savebar{transition:none}
}

.toast{position:fixed;left:50%;bottom:88px;transform:translate(-50%,14px);z-index:var(--z-toast);
  background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:13px;
  padding:10px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity var(--t),transform var(--t)}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.bad{background:var(--danger);color:#2a0710}
.hint{font-size:12px;color:var(--muted);line-height:1.55;margin-top:9px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../../shared/config.js?v=7"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const CFG = window.KV_CONFIG || {};
const app = document.getElementById('app');
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fdate = s => { try { return new Date(s).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch (e) { return s; } };

if (!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY) {
  app.innerHTML = '<div class="auth"><div class="auth-box"><h1>Не задан Supabase</h1><p class="lead">Заполните SUPABASE_URL и ключ в shared/config.js.</p></div></div>';
  throw new Error('no supabase config');
}
const sb = createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {
  auth: { persistSession: true, storageKey: 'kv_sb_auth', detectSessionInUrl: false }
});

let me = null, profile = null, tab = 'orders', overview = null;

function toast(text, bad) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.toggle('bad', !!bad);
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ================= вход ================= */
function authView(errText) {
  app.innerHTML = `
    <div class="auth"><div class="auth-box">
      <div class="auth-mark"><img src="../../data/photos/cat.png" alt=""><div>
        <b>KatoVape</b><span>панель управления</span></div></div>
      <h1>Вход для менеджеров</h1>
      <p class="lead">Войдите аккаунтом магазина или через Telegram. Доступ открыт только тем, кому его выдали.</p>
      <form id="pwform">
        <label class="f">Логин, почта или телефон
          <input id="ident" autocomplete="username" placeholder="manager"></label>
        <label class="f">Пароль
          <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"></label>
        <button class="btn primary" type="submit" id="pwgo">Войти</button>
      </form>
      <div class="sep">или</div>
      <div class="tgwrap" id="tgwrap"></div>
      <div class="msg err" id="err" ${errText ? '' : 'hidden'}>${errText ? esc(errText) : ''}</div>
    </div></div>`;

  document.getElementById('pwform').onsubmit = async e => {
    e.preventDefault();
    const btn = document.getElementById('pwgo');
    const ident = document.getElementById('ident').value.trim();
    const pw = document.getElementById('pw').value;
    if (!ident || !pw) return showErr('Заполните оба поля');
    btn.disabled = true; btn.textContent = 'Проверяем…';
    try {
      // логин разрешает и пароль проверяет сервер, наружу почта менеджера не уходит
      const res = await fetch(CFG.FUNCTIONS_URL.replace(/\/$/, '') + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json', apikey: CFG.SUPABASE_ANON_KEY },
        body: JSON.stringify({ identifier: ident, password: pw })
      });
      const out = await res.json().catch(() => ({}));
      if (!res.ok || !out.access_token) throw new Error('Неверный логин или пароль');
      const { error } = await sb.auth.setSession({ access_token: out.access_token, refresh_token: out.refresh_token });
      if (error) throw error;
      await afterLogin();
    } catch (e2) {
      btn.disabled = false; btn.textContent = 'Войти';
      showErr(e2.message || 'Не вышло войти');
    }
  };

  if (CFG.TELEGRAM_BOT) {
    const s = document.createElement('script');
    s.async = true; s.src = 'https://telegram.org/js/telegram-widget.js?22';
    s.setAttribute('data-telegram-login', CFG.TELEGRAM_BOT);
    s.setAttribute('data-size', 'large');
    s.setAttribute('data-onauth', 'onTgAuth(user)');
    s.setAttribute('data-request-access', 'write');
    document.getElementById('tgwrap').appendChild(s);
  }
}
function showErr(text) {
  const box = document.getElementById('err');
  if (!box) return;
  box.textContent = text; box.hidden = false;
}

async function exchangeTg(body) {
  const res = await fetch(CFG.FUNCTIONS_URL.replace(/\/$/, '') + '/telegram-auth', {
    method: 'POST', headers: { 'Content-Type': 'application/json', apikey: CFG.SUPABASE_ANON_KEY },
    body: JSON.stringify(body)
  });
  const out = await res.json().catch(() => ({}));
  if (!res.ok || !out.email || !out.otp) throw new Error(out.error || 'не удалось войти');
  const { error } = await sb.auth.verifyOtp({ email: out.email, token: out.otp, type: 'magiclink' });
  if (error) throw error;
}
window.onTgAuth = async u => {
  try { await exchangeTg({ mode: 'widget', payload: u }); await afterLogin(); }
  catch (e) { authView(e.message || 'ошибка входа'); }
};
// панель открыта из бота как мини-апп: initData уже подписан, вход идёт сам
async function tgInitLogin() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (!tg || !tg.initData) return false;
  try { await exchangeTg({ mode: 'initdata', initData: tg.initData }); await afterLogin(); return true; }
  catch (e) { return false; }
}

async function afterLogin() {
  const { data: { user } } = await sb.auth.getUser();
  const { data: ov, error } = await sb.rpc('admin_overview');
  if (error || !ov) {
    await sb.auth.signOut();
    return authView('У этого аккаунта нет доступа в панель. Попросите владельца выдать его во вкладке «Доступ».');
  }
  me = user; overview = ov;
  const { data: p } = await sb.from('profiles').select('display_name, username, avatar').eq('id', user.id).maybeSingle();
  profile = p || null;
  shell();
}

/* ================= каркас ================= */
const ROLE_RU = { owner: 'владелец', dev: 'разработчик', manager: 'менеджер' };
const TABS = [
  ['orders', 'Заказы', ov => ov.orders_new],
  ['reservations', 'Бронь', ov => ov.res_active],
  ['products', 'Ассортимент', null],
  ['customers', 'Клиенты', null],
  ['demand', 'Спрос', null],
  ['broadcast', 'Рассылка', null],
  ['access', 'Доступ', null]
];

function shell() {
  const name = (profile && (profile.display_name || profile.username)) || 'менеджер';
  const av = profile && profile.avatar;
  app.innerHTML = `
    <div class="shell">
      <aside class="side">
        <div class="brand"><img src="../../data/photos/cat.png" alt=""><div>
          <b>KatoVape</b><span>управление</span></div></div>
        <nav class="nav" id="nav">
          ${TABS.filter(([k]) => k !== 'access' || (overview && overview.can_grant)).map(([k, label, badge]) => {
            const n = badge && overview ? badge(overview) : 0;
            return `<button data-t="${k}" class="${k === tab ? 'on' : ''}">${label}
              ${n ? `<i class="count">${n}</i>` : ''}</button>`;
          }).join('')}
        </nav>
        <div class="who">
          <div class="who-ava">${av ? `<img src="${esc(av)}" alt="">` : esc(name[0].toUpperCase())}</div>
          <div class="who-name"><b>${esc(name)}</b><span>${esc(ROLE_RU[overview && overview.role] || 'доступ выдан')}</span></div>
          <button class="btn quiet sm" id="logout">Выйти</button>
        </div>
      </aside>
      <main class="main" id="main"></main>
    </div>
    <div class="savebar" id="savebar">
      <b id="sb-count">Изменений нет</b>
      <span id="sb-note">не сохранено</span>
      <div class="grow"></div>
      <button class="btn quiet" id="sb-reset">Отменить</button>
      <button class="btn primary" id="sb-apply">Применить</button>
    </div>`;
  document.getElementById('nav').onclick = e => {
    const b = e.target.closest('[data-t]');
    if (!b || b.dataset.t === tab) return;
    if (hasChanges() && !confirm('Есть несохранённые изменения в ассортименте. Уйти и потерять их?')) return;
    clearDirty(); tab = b.dataset.t; shell();
  };
  document.getElementById('logout').onclick = async () => { await sb.auth.signOut(); me = null; authView(); };
  document.getElementById('sb-reset').onclick = () => { clearDirty(); render(); };
  document.getElementById('sb-apply').onclick = saveProducts;
  render();
}

function loading() {
  return '<div class="panel"><div class="skeleton"><i></i><i></i><i></i><i></i></div></div>';
}
function empty(title, text) {
  return `<div class="empty"><b>${esc(title)}</b>${esc(text)}</div>`;
}
function panel(title, body, tools) {
  return `<div class="panel"><div class="panel-head"><h2>${esc(title)}</h2>
    ${tools ? `<div class="tools">${tools}</div>` : ''}</div>${body}</div>`;
}
function table(head, rows) {
  if (!rows.length) return '';
  return `<div class="scroll"><table><thead><tr>${head.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c == null ? '' : c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

const ST = { new: ['новый', 'new'], confirmed: ['подтверждён', 'live'], done: ['выдан', 'ok'],
  cancelled: ['отменён', 'off'], active: ['активна', 'live'], notified: ['напомнили', 'live'],
  expired: ['истекла', 'off'], waiting: ['ждёт', 'new'] };
const pill = s => { const x = ST[s] || [s, '']; return `<span class="pill ${x[1]}">${esc(x[0])}</span>`; };

function itemsStr(items) {
  return (items || []).map(i => typeof i === 'string' ? i
    : (i.name || i.id) + (i.flavor ? ' · ' + i.flavor : '') + ' ×' + (i.n || 1)).join(', ');
}

/* ================= вкладки ================= */
async function render() {
  const m = document.getElementById('main'); if (!m) return;
  const titles = { orders: ['Заказы', 'Подтверждайте и отмечайте выдачу — клиенту уходит уведомление в Telegram.'],
    reservations: ['Бронь', 'Отменённая или просроченная бронь возвращает товар в наличие сама.'],
    products: ['Ассортимент', 'Правки видны на витрине сразу после сохранения.'],
    customers: ['Клиенты', 'Те, кто заводил аккаунт в магазине.'],
    demand: ['Спрос', 'Что чаще всего смотрят и бронируют.'],
    broadcast: ['Рассылка', 'Сообщение уйдёт всем, кто общался с ботом.'],
    access: ['Доступ', 'Кто может открывать эту панель.'] };
  const [h, sub] = titles[tab] || ['', ''];
  m.innerHTML = `<div class="head"><h1>${h}</h1><p>${sub}</p></div>${summaryHTML()}${loading()}`;
  const slot = () => m.querySelector('.panel');

  try {
    if (tab === 'orders') await renderOrders(m);
    else if (tab === 'reservations') await renderReservations(m);
    else if (tab === 'products') await renderProducts(m);
    else if (tab === 'customers') await renderCustomers(m);
    else if (tab === 'demand') await renderDemand(m);
    else if (tab === 'broadcast') await renderBroadcast(m);
    else if (tab === 'access') await renderAccess(m);
  } catch (e) {
    const s = slot(); if (s) s.outerHTML = panel('Ошибка', `<div class="empty">${esc(e.message || e)}</div>`);
  }
}
function summaryHTML() {
  const o = overview || {};
  const row = (v, label, hot) => `<div class="${hot ? 'hot' : ''}"><b>${v == null ? 0 : v}</b><span>${label}</span></div>`;
  return `<div class="summary">
    ${row(o.orders_new, 'новых заказов', o.orders_new > 0)}
    ${row(o.orders, 'заказов всего')}
    ${row(o.res_active, 'активных броней', o.res_active > 0)}
    ${row(o.waiting, 'ждут поступления')}
    ${row(o.users, 'клиентов')}
    ${row(o.bot_users, 'в боте')}
    ${row(o.reviews, 'отзывов')}
  </div>`;
}
function swap(m, html) { const p = m.querySelector('.panel'); if (p) p.outerHTML = html; }

async function refreshOverview() {
  const { data } = await sb.rpc('admin_overview');
  if (data) { overview = data; const s = document.querySelector('.summary'); if (s) s.outerHTML = summaryHTML(); }
}

async function renderOrders(m) {
  const { data } = await sb.from('orders').select('*').order('id', { ascending: false }).limit(200);
  const rows = (data || []).map(o => {
    const c = o.contact || {};
    const who = [c.name, c.phone, c.email, c.paczkomat ? 'пачкомат ' + c.paczkomat : ''].filter(Boolean).map(esc).join('<br>');
    const acts = o.status === 'new'
      ? btn('ost', o.id, 'confirmed', 'Подтвердить', 'primary') + btn('ost', o.id, 'cancelled', 'Отказ', 'danger')
      : o.status === 'confirmed'
        ? btn('ost', o.id, 'done', 'Выдан', 'primary') + btn('ost', o.id, 'cancelled', 'Отказ', 'danger') : '';
    return [`<span class="num">#${o.id}</span><span class="sub">${fdate(o.created_at)}</span>`,
      esc(itemsStr(o.items)) + `<span class="sub">${esc(o.city)} · ${esc(o.delivery || '')}${o.address ? ' · ' + esc(o.address) : ''}</span>`,
      who || '<span class="sub">нет данных</span>',
      `<span class="num">${o.sum || 0} zł</span>`, pill(o.status), `<div class="tools">${acts}</div>`];
  });
  swap(m, panel('Все заказы', rows.length
    ? table(['Заказ', 'Состав', 'Клиент', 'Сумма', 'Статус', ''], rows)
    : empty('Заказов пока нет', 'Как только кто-то оформит заказ на витрине, он появится здесь.')));
  bindStatus(m, 'ost', 'orders');
}

async function renderReservations(m) {

  const rows = (data || []).map(r => {

function btn(kind, id, st, label, cls) {
  return `<button class="btn sm ${cls || ''}" data-${kind}="${st}" data-id="${id}">${label}</button>`;
}
function bindStatus(m, kind, tableName) {
  m.querySelectorAll('[data-' + kind + ']').forEach(b => b.onclick = async () => {
    b.disabled = true;
    const patch = { status: b.dataset[kind === 'ost' ? 'ost' : 'rst'] };
    if (tableName === 'orders') patch.updated_at = new Date().toISOString();
    const { error } = await sb.from(tableName).update(patch).eq('id', +b.dataset.id);
    if (error) { b.disabled = false; return toast(error.message, true); }
    toast('Статус обновлён');
    await refreshOverview();
    render();
  });
}

async function renderBroadcast(m) {
  const { count } = await sb.from('bot_users').select('telegram_id', { count: 'exact', head: true }).eq('opted_in', true);
  const { data: last } = await sb.from('broadcasts').select('*').order('id', { ascending: false }).limit(5);
  const bcPill = s => s === 'done' ? '<span class="pill ok">разослана</span>'
    : s === 'sending' ? '<span class="pill live">отправляем</span>'
    : '<span class="pill new">в очереди</span>';
  const hist = (last || []).map(b => [`<span class="num">#${b.id}</span>`, esc((b.text || '').slice(0, 60)),
    bcPill(b.status),
    `<span class="num">${b.sent || 0} / ${b.failed || 0}</span>`, `<span class="num">${b.sent_at ? fdate(b.sent_at) : '—'}</span>`]);
  swap(m, panel('Новая рассылка', `<div class="panel-body">
      <textarea id="bctext" rows="4" placeholder="Что написать подписчикам бота"></textarea>
      <div class="tools" style="margin-top:12px">
        <button class="btn primary" id="bcsend" ${count ? '' : 'disabled'}>Отправить ${count || 0} подписчикам</button>
        <span class="hint" style="margin:0" id="bcres"></span>
      </div>
      <p class="hint">Получают только те, кто писал боту. Кому не доставилось, того бот сам исключит из списка.
      ${count ? '' : 'Сейчас подписчиков нет: попросите людей открыть бота и нажать «Старт».'}</p>
    </div>`) + (hist.length ? panel('Последние рассылки', table(['#', 'Текст', 'Статус', 'Ушло / ошибок', 'Когда'], hist)) : ''));

  const send = document.getElementById('bcsend');
  if (send) send.onclick = async () => {
    const text = document.getElementById('bctext').value.trim();
    if (!text) return toast('Сначала напишите текст', true);
    send.disabled = true; send.textContent = 'Ставим в очередь…';
    const { data, error } = await sb.from('broadcasts').insert({ text, author: me.id }).select().single();
    if (error) { send.disabled = false; send.textContent = 'Отправить'; return toast(error.message, true); }
    document.getElementById('bcres').textContent = 'В очереди, бот разошлёт за минуту…';
    watchBroadcast(data.id);
  };
}
// бот забирает рассылку из очереди, поэтому ждём и показываем реальный итог
async function watchBroadcast(id) {
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 3000));
    const { data } = await sb.from('broadcasts').select('status, sent, failed').eq('id', id).maybeSingle();
    if (!data) continue;
    const res = document.getElementById('bcres');
    if (data.status === 'done') {
      if (res) res.textContent = `Готово: доставлено ${data.sent}, не дошло ${data.failed}`;
      toast('Рассылка отправлена');
      return render();
    }
    if (res) res.textContent = data.status === 'sending' ? 'Отправляем…' : 'В очереди…';
  }
  const res = document.getElementById('bcres');
  if (res) res.textContent = 'Бот пока не забрал очередь. Проверьте, что он запущен на сервере.';
}

      <div class="tools" style="margin-top:10px">
        <input id="granttg" placeholder="Telegram ID, например 5301671230" style="width:230px" inputmode="numeric">
        ${roleSelect('granttgrole', 'manager')}
        <button class="btn" id="granttggo">Выдать по Telegram ID</button>
      </div>
      <p class="hint">По логину доступ выдаётся тем, кто уже завёл аккаунт с паролем. По Telegram ID можно выдать
      заранее: человек получит доступ сам, как только первый раз откроет магазин через бота.
      Повторная выдача тому же человеку просто меняет роль.</p>
      <p class="hint"><b>Владелец</b> и <b>разработчик</b> могут всё, включая выдачу доступа.
      <b>Менеджер</b> видит все разделы, кроме этого.</p>
    </div>`));

  const byLogin = document.getElementById('grantgo');
  if (byLogin) byLogin.onclick = async () => {
    const login = document.getElementById('grant').value.trim();
    if (!login) return toast('Впишите логин или почту', true);
    byLogin.disabled = true;
    const { data: name, error } = await sb.rpc('admin_grant', {
      p_login: login, p_role: document.getElementById('grantrole').value
    });
    byLogin.disabled = false;
    if (error) return toast(grantErr(error), true);
    toast('Доступ выдан: ' + name);

  };

  if (byTg) byTg.onclick = async () => {
    const tid = document.getElementById('granttg').value.trim();
    if (!/^\d+$/.test(tid)) return toast('Telegram ID это только цифры', true);
    byTg.disabled = true;
    const { error } = await sb.rpc('admin_grant_telegram', {
      p_tid: Number(tid), p_role: document.getElementById('granttgrole').value
    });
    byTg.disabled = false;
    if (error) return toast(grantErr(error), true);
    toast('Доступ выдан по Telegram ID');

  };
  m.querySelectorAll('[data-revoke]').forEach(b => b.onclick = async () => {
    if (!confirm('Забрать доступ у ' + b.dataset.revoke + '?')) return;
    const { error } = await sb.rpc('admin_revoke', { p_ident: b.dataset.revoke });
    if (error) return toast(grantErr(error), true);
    toast('Доступ забран');
    render();
  });
}
function grantErr(error) {
  const s = String(error.message || '');
  if (s.includes('NO_USER')) return 'Такого аккаунта нет. По Telegram ID можно выдать заранее.';
  if (s.includes('SELF_REVOKE')) return 'Себя разжаловать нельзя';
  if (s.includes('NOT_ALLOWED')) return 'Выдавать доступ могут только владелец и разработчик';
  if (s.includes('BAD_ROLE')) return 'Неизвестная роль';
  return s;
}

let groups = [], cityNow = 'katowice';

// Изменения считаем сравнением полей с тем, что пришло из базы. Прежний список
// «грязных» строк врал: правка одного товара помечала все его вкусы, а возврат
// значения обратно флаг не снимал, и сохранение всё равно считало заново.
function changedItems() {
  const m = document.getElementById('main'); if (!m) return [];
  const out = [];
  groups.forEach((g, gi) => {
    const card = m.querySelector('.item[data-g="' + gi + '"]'); if (!card) return;
    const gv = k => card.querySelector('[data-p="' + k + '"]').value.trim();
    const name = gv('name'), brand = gv('brand'), category = gv('category'), nic = gv('nic');
    const priceRaw = gv('price');
    const price = priceRaw === '' ? null : Number(priceRaw);
    const headChanged = name !== (g.head.name || '') || brand !== (g.head.brand || '')
      || category !== (g.head.category || '') || nic !== (g.head.nic || '') || price !== g.head.price;
    const rows = [];
    g.items.forEach((r, ri) => {
      const row = card.querySelector('.flav[data-f="' + gi + ':' + ri + '"]'); if (!row) return;
      const qtyRaw = row.querySelector('[data-q]').value.trim();
      const qty = qtyRaw === '' ? 0 : Number(qtyRaw);
      row.classList.toggle('dirty', qty !== r.qty);
      if (headChanged || qty !== r.qty) rows.push({ r, qty });
    });
    card.classList.toggle('dirty', headChanged);
    if (rows.length) out.push({ g, name, brand, category, nic, price, rows, bad: priceRaw !== '' && !Number.isFinite(price) });
  });
  return out;
}
function clearDirty() { updateSaveBar(); }
function updateSaveBar() {
  const bar = document.getElementById('savebar'); if (!bar) return;
  const n = changedItems().length;
  bar.classList.toggle('show', n > 0);
  const c = document.getElementById('sb-count');
  const note = document.getElementById('sb-note');
  if (c) c.textContent = n === 1 ? 'Изменён один товар' : 'Изменено товаров: ' + n;
  if (note) note.textContent = 'изменения ещё не сохранены';
}
function hasChanges() { return changedItems().length > 0; }
window.addEventListener('beforeunload', e => { if (hasChanges()) { e.preventDefault(); e.returnValue = ''; } });

function bindProducts(m) {
  m.querySelectorAll('[data-city]').forEach(b => b.onclick = () => {
    if (hasChanges() && !confirm('Есть несохранённые изменения. Сменить город и потерять их?')) return;
    clearDirty(); cityNow = b.dataset.city; render();
  });
  const pq = document.getElementById('pq');
  if (pq) pq.oninput = () => {
    const v = pq.value.trim().toLowerCase();
    m.querySelectorAll('.item').forEach(it => {
      it.style.display = !v || it.dataset.search.indexOf(v) >= 0 ? '' : 'none';
    });
  };
  // пересчитываем при каждом вводе: вернул значение обратно — панель сама уходит
  m.querySelectorAll('.item').forEach(card => {
    card.addEventListener('input', e => {
      if (e.target.dataset.p === undefined && e.target.dataset.q === undefined) return;
      updateSaveBar();
    });
  });
  m.querySelectorAll('[data-delp]').forEach(b => b.onclick = async () => {
    const g = groups[+b.dataset.delp]; if (!g) return;
    if (!confirm('Удалить «' + (g.head.name || g.id) + '» со всеми вкусами?')) return;
    const { error } = await sb.from('products').delete().match({ id: g.id, city: cityNow });
    if (error) return toast(error.message, true);
    toast('Товар удалён'); clearDirty(); render();
  });
  m.querySelectorAll('[data-delf]').forEach(b => b.onclick = async () => {
    const [gi, ri] = b.dataset.delf.split(':').map(Number);
    const r = groups[gi] && groups[gi].items[ri]; if (!r) return;
    if (!confirm('Удалить вкус «' + (r.flavor || 'без вкуса') + '»?')) return;
    const { error } = await sb.from('products').delete().match({ id: r.id, city: r.city, flavor: r.flavor });
    if (error) return toast(error.message, true);
    toast('Вкус удалён'); clearDirty(); render();
  });
  m.querySelectorAll('[data-addf]').forEach(b => b.onclick = async () => {
    const gi = +b.dataset.addf, g = groups[gi]; if (!g) return;
    const fl = m.querySelector('[data-nf="' + gi + '"]').value.trim();
    const qv = m.querySelector('[data-nq="' + gi + '"]').value.trim();
    if (!fl) return toast('Впишите название вкуса', true);
    const h = g.head;
    const { error } = await sb.from('products').upsert([{
      id: g.id, city: cityNow, flavor: fl, name: h.name, brand: h.brand, category: h.category,
      nic: h.nic, price: h.price, qty: +qv || 0, updated_at: new Date().toISOString()
    }], { onConflict: 'id,city,flavor' });
    if (error) return toast(error.message, true);
    toast('Вкус добавлен'); clearDirty(); render();
  });
  const add = document.getElementById('np_add');
  if (add) add.onclick = async () => {
    const id = document.getElementById('np_id').value.trim();
    if (!id) return toast('Нужен id товара', true);
    const priceRaw = document.getElementById('np_price').value.trim();
    const { error } = await sb.from('products').upsert([{
      id, city: cityNow, flavor: document.getElementById('np_flavor').value.trim(),
      name: document.getElementById('np_name').value.trim() || id,
      category: document.getElementById('np_cat').value.trim() || null,
      price: priceRaw === '' ? null : Number(priceRaw),
      qty: +document.getElementById('np_qty').value || 0,
      updated_at: new Date().toISOString()
    }], { onConflict: 'id,city,flavor' });
    if (error) return toast(error.message, true);
    toast('Товар добавлен'); clearDirty(); render();
  };
}

async function saveProducts() {
  const btn = document.getElementById('sb-apply');
  // сохраняем ровно то, что панель посчитала изменённым, чтобы счётчик и запись
  // не расходились между собой
  const changed = changedItems();
  const broken = changed.find(x => x.bad);
  if (broken) return toast('Цена у «' + (broken.name || broken.g.id) + '» не число', true);
  const out = [];
  changed.forEach(x => x.rows.forEach(({ r, qty }) => out.push({
    id: r.id, city: r.city, flavor: r.flavor, name: x.name || r.id,
    brand: x.brand || null, category: x.category || null, nic: x.nic || null,
    price: x.price, qty: Number.isFinite(qty) ? qty : 0, updated_at: new Date().toISOString()
  })));
  if (!out.length) { clearDirty(); return toast('Изменений нет'); }
  btn.disabled = true; btn.textContent = 'Сохраняем…';
  const { error } = await sb.from('products').upsert(out, { onConflict: 'id,city,flavor' });
  btn.disabled = false; btn.textContent = 'Применить';
  if (error) return toast(error.message, true);
  toast('Сохранено: ' + out.length);
  clearDirty();
  render();
}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KatoVape</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9f1fa; --ink:#0f2136; --mut:#5f7391;
  --blu:#1861ff; --cyan:#38c6ff; --grn:#0eb981; --red:#e94b6a;
  --glass:rgba(255,255,255,.65); --gline:rgba(255,255,255,.85);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:Onest,system-ui,sans-serif;padding-bottom:92px;overflow-x:hidden}
button{font-family:inherit}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.b1{width:520px;height:520px;background:radial-gradient(closest-side,rgba(143,210,255,.55),transparent 70%);top:-180px;left:-150px}
.b2{width:460px;height:460px;background:radial-gradient(closest-side,rgba(185,168,255,.5),transparent 70%);bottom:-40px;right:-170px}
.top{position:relative;z-index:1;padding:18px 16px 12px;display:flex;align-items:center;gap:10px}
.top h1{font-size:20px;font-weight:900;letter-spacing:-.3px}
.top h1 em{font-style:normal;background:linear-gradient(100deg,var(--blu),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.top .upd{font-size:11.5px;color:var(--mut)}
#lang{position:relative;margin-left:auto}
#lang .kv-city{width:auto;padding:8px 12px;font-size:12px}
#lang .kv-city-menu{left:auto;right:0;min-width:150px}
#city{position:relative;margin-bottom:8px}
.kv-city{display:flex;align-items:center;gap:7px;width:100%;border:none;background:#fff;color:var(--ink);padding:11px 14px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(31,71,125,.1)}
.kv-city-pin{color:var(--blu);font-size:9px}
.kv-city-car{color:var(--mut);font-size:11px;margin-left:auto}
.kv-city-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;background:#fff;border:1px solid var(--gline);border-radius:14px;padding:6px;box-shadow:0 16px 36px rgba(31,71,125,.2)}
.kv-city-menu[hidden]{display:none}
.kv-city-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);padding:11px 12px;border-radius:10px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit}
.kv-city-menu button.on{color:var(--blu)}

.sticky{position:sticky;top:0;z-index:10;background:rgba(233,241,250,.96);padding:8px 16px 10px}
.srow{display:flex;gap:8px;margin-bottom:10px}
.search{flex:1;background:#fff;border:1px solid var(--gline);border-radius:14px;color:var(--ink);padding:11px 14px;font-family:inherit;font-size:14px;outline:none;box-shadow:0 4px 14px rgba(31,71,125,.08)}
.cartbtn{border:none;background:#fff;color:var(--ink);padding:0 14px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px rgba(31,71,125,.12)}
.cartbtn b{color:var(--blu)}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--gline);background:var(--glass);color:var(--mut);padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.chip.on{background:linear-gradient(100deg,var(--blu),var(--cyan));border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(24,97,255,.3)}

.sec{position:relative;z-index:1;padding:16px 16px 4px}
.sec h2{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-weight:800;margin-bottom:10px}
.sec h2 b{color:var(--blu)}
.row{background:rgba(255,255,255,.78);border:1px solid var(--gline);border-radius:18px;margin-bottom:9px;overflow:hidden;box-shadow:0 8px 22px rgba(31,71,125,.09)}
.row.is-out{opacity:.55}
.rhead{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer}
.kv-photo{position:relative;width:46px;height:46px;border-radius:13px;background:linear-gradient(150deg,#ffffff,#dcebfb);display:grid;place-items:center;overflow:hidden;flex-shrink:0}
.kv-photo span{font-size:18px;font-weight:900;color:#b9d2ea}
.kv-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.rmain{flex:1;min-width:0}
.rname{font-weight:800;font-size:14px;line-height:1.3}
.rsub{font-size:11.5px;color:var(--mut);margin-top:2px}
.rsub b{color:var(--ink)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.in{background:var(--grn)}
.dot.out{background:var(--red)}
.dot.new{background:var(--blu)}

.kv-details{display:none;border-top:1px solid rgba(31,71,125,.12);padding:10px 13px 13px}
.row.open .kv-details{display:block}
.kvf-meta{font-size:11.5px;color:var(--mut);margin-bottom:8px}
.kvf-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dashed rgba(31,71,125,.15);font-size:12.5px}
.kvf-row:last-child{border-bottom:none}
.kvf-row.off{opacity:.5}
.kvf-name{flex:1;font-weight:700}
.kvf-qty{color:var(--mut);font-size:10.5px}
.kvf-add{border:none;background:linear-gradient(100deg,var(--blu),var(--cyan));color:#fff;border-radius:99px;padding:5px 12px;font-size:10.5px;font-weight:800;cursor:pointer}
.kvf-res{margin-top:10px;width:100%;border:1px solid var(--blu);background:transparent;color:var(--blu);border-radius:11px;padding:8px;font-size:11.5px;font-weight:800;cursor:pointer}
.empty{padding:30px 16px;color:var(--mut);text-align:center;position:relative;z-index:1}

.cta{position:fixed;left:16px;right:16px;bottom:16px;background:linear-gradient(100deg,var(--blu),var(--cyan));color:#fff;text-align:center;border:none;font-weight:800;font-size:14px;padding:16px;border-radius:16px;box-shadow:0 12px 28px rgba(24,97,255,.4);cursor:pointer;z-index:20}

.kvd{position:fixed;inset:0;z-index:90;background:rgba(20,40,70,.4)}
.kvd[hidden]{display:none}
.kvd-box{position:absolute;left:0;right:0;bottom:0;max-height:80vh;background:#fff;border-radius:24px 24px 0 0;padding:20px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;box-shadow:0 -12px 40px rgba(31,71,125,.25)}
.kvd-head{display:flex;align-items:center;justify-content:space-between}
.kvd-title{font-size:17px;font-weight:900}
.kvd-x{border:none;background:none;color:var(--mut);font-size:24px;cursor:pointer}
.kvd-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px dashed rgba(31,71,125,.15);font-size:13px}
.kvd-name{flex:1;font-weight:700}
.kvd-name small{display:block;color:var(--mut);font-weight:400}
.kvd-ctr{display:flex;align-items:center;gap:7px}
.kvd-ctr button{width:25px;height:25px;border-radius:9px;border:1px solid #dbe7f5;background:#fff;color:var(--ink);cursor:pointer}
.kvd-sum{color:var(--blu);font-weight:800;min-width:48px;text-align:right;font-size:12.5px}
.kvd-empty{color:var(--mut)}
.kvd-total{font-size:15px;font-weight:900}
.kvd-go{background:linear-gradient(100deg,var(--blu),var(--cyan));color:#fff;border:none;border-radius:14px;padding:13px;font-weight:800;font-size:13px;cursor:pointer}
.kvd-clear{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer}

.kv-toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);background:var(--ink);color:#fff;font-weight:700;font-size:12.5px;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:120;max-width:90vw;text-align:center}
.kv-toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div class="blob b1"></div><div class="blob b2"></div>

<div class="top">
  <div>
    <h1>Kato<em>Vape</em></h1>
    <div class="upd" id="upd"></div>
  </div>
  <div id="lang"></div>
</div>

<div class="sticky">
  <div id="city"></div>
  <div class="srow">
    <input class="search" id="q" type="search">
    <button class="cartbtn" id="cartFab" onclick="KV.openCart()"></button>
  </div>
  <div class="chips" id="chips"></div>
</div>

<div id="list"></div>
<button class="cta" id="cta"></button>

<script src="../../../shared/core.js?v=7"></script>
<script>
let cat = 'all', q = '';
const tg = window.Telegram && window.Telegram.WebApp;
const inTg = !!(tg && tg.initData);

if (inTg) {
  tg.ready(); tg.expand();
  tg.setHeaderColor('#e9f1fa'); tg.setBackgroundColor('#e9f1fa');
  document.getElementById('cta').style.display = 'none';
  document.body.style.paddingBottom = '20px';
  tg.MainButton.onClick(() => {
    if (KV.cartCount()) KV.openCart(); else tg.openTelegramLink(KV.manager);
  });
}

function render() {
  const db = KV.db;
  upd.textContent = KV.t('updated') + ' ' + KV.fmtDate(db.updated);
  document.getElementById('q').placeholder = KV.t('search');

  const cats = [{ id: 'all', name: null }, ...db.categories];
  chips.innerHTML = cats.map(c =>
    '<button class="chip' + (c.id === cat ? ' on' : '') + '" data-c="' + c.id + '">' +
    (c.name ? KV.catName(c) : { ru: 'Все', uk: 'Всі', pl: 'Wszystko' }[KV.lang]) + '</button>').join('');
  drawList();
}

function drawList() {
  const db = KV.db, out = [];
  for (const c of db.categories) {
    if (cat !== 'all' && c.id !== cat) continue;
    const items = c.items.filter(i => KV.match(i, q));
    if (!items.length) continue;
    const have = items.filter(i => KV.status(i) !== 'out').length;
    out.push('<div class="sec"><h2>' + KV.catName(c) + ' <b>' + have + '/' + items.length + '</b></h2>' +
      items.map(i => {
        const st = KV.status(i);
        return '<div class="row' + (st === 'out' ? ' is-out' : '') + '">' +
          '<div class="rhead">' + KV.photo(i) +
            '<div class="rmain">' +
              '<div class="rname">' + i.name + '</div>' +
              '<div class="rsub"><b>' + KV.price(i) + '</b>' +
                (st !== 'out' ? ' · ' + KV.qty(i) + ' ' + KV.t('pcs') : ' · ' + KV.t('out')) +
                (st === 'new' ? ' · ' + KV.t('new') : '') + '</div>' +
            '</div>' +
            '<span class="dot ' + st + '"></span>' +
          '</div>' + KV.detailsHTML(i) + '</div>';
      }).join('') + '</div>');
  }
  list.innerHTML = out.join('') || '<p class="empty">' + KV.t('empty') + '</p>';
}

chips.onclick = e => {
  const b = e.target.closest('.chip'); if (!b) return;
  cat = b.dataset.c;
  chips.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x === b));
  drawList();
};
document.getElementById('q').oninput = e => { q = e.target.value.trim().toLowerCase(); drawList(); };
list.onclick = e => {
  if (e.target.closest('button')) return;
  const row = e.target.closest('.row');
  if (row) row.classList.toggle('open');
};

function cartHook() {
  const n = KV.cartCount();
  cartFab.innerHTML = KV.t('cart') + (n ? ' <b>' + n + '</b>' : '');
  const cta = document.getElementById('cta');
  if (inTg) {
    tg.MainButton.setParams({
      text: n ? KV.t('cart') + ' (' + n + ') · ' + KV.cartTotal() + ' zł' : KV.t('write'),
      color: '#1861ff', text_color: '#ffffff'
    });
    tg.MainButton.show();
  } else {
    cta.textContent = n ? KV.t('cart') + ' (' + n + ') · ' + KV.cartTotal() + ' zł' : KV.t('write');
    cta.onclick = () => { if (KV.cartCount()) KV.openCart(); else window.open(KV.manager, '_blank'); };
  }
}

KV.init({
  render, cart: cartHook,
  fail: () => { list.innerHTML = '<p class="empty">Базу не удалось загрузить, открой демо через локальный сервер.</p>'; }
});
</script>
</body>
</html>

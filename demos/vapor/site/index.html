<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KatoVape · Vapor</title>
<link rel="icon" type="image/png" href="../../../data/photos/cat.png">
<meta name="description" content="KatoVape Vapor: украинские вейпы в Польше, живой дымный интерфейс, наличие по городам.">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10; --panel:#0f141b; --panel2:#141b24; --line:#222c38;
  --mint:#5ff3d0; --cyan:#65dfff; --violet:#9d8bff; --red:#ff6a86;
  --txt:#e9f2f4; --mut:#8593a1;
  --kv-surface:var(--panel); --kv-surface2:var(--panel2); --kv-line:var(--line);
  --kv-text:var(--txt); --kv-muted:var(--mut); --kv-field:#0c1119;
  --kv-accent:var(--mint); --kv-accent-2:var(--mint); --kv-accent-ink:#04120e;
  --kv-radius:16px; --kv-shadow:0 20px 50px rgba(0,0,0,.5); --kv-gate-bg:rgba(4,7,11,.96);
}
html[data-theme="light"]{
  --bg:#eef4f4; --panel:#fff; --panel2:#fff; --line:#dde7e7; --txt:#0d1a1c; --mut:#5a6a72;
  --kv-field:#fff; --kv-accent:#0aa585; --kv-accent-2:#0aa585; --kv-accent-ink:#fff; --kv-gate-bg:rgba(238,244,244,.96);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:Sora,system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
#vapor{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.9}
.wrap{max-width:1100px;margin:0 auto;padding:0 22px;position:relative;z-index:1}
h1,h2,.logo{font-family:'Space Grotesk',sans-serif}
button{font-family:inherit}
a{color:inherit}

header{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:linear-gradient(180deg,rgba(8,11,16,.85),rgba(8,11,16,.5));border-bottom:1px solid var(--line);transition:transform .3s}
html[data-theme="light"] header{background:linear-gradient(180deg,rgba(238,244,244,.9),rgba(238,244,244,.5))}
header.kv-hidden{transform:translateY(-110%)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;flex-wrap:wrap}
.nav-l,.nav-r{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;text-decoration:none;color:var(--txt)}
.logo-badge{width:36px;height:36px;border-radius:50%;overflow:hidden;background:#fff;box-shadow:0 0 0 1px var(--line),0 0 22px rgba(95,243,208,.35)}
.logo-badge img{width:100%;height:100%;object-fit:cover;transform:scale(1.72);transform-origin:50% 38%}
.logo em{font-style:normal;background:linear-gradient(100deg,var(--mint),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
#city{position:relative}
.kv-city{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:8px 13px;border-radius:99px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.kv-city:hover{border-color:var(--mint)}
.kv-city-pin{color:var(--mint);font-size:9px}.kv-city-car{color:var(--mut);font-size:10px}
.kv-city-menu{position:absolute;top:calc(100% + 8px);left:0;z-index:60;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:6px;min-width:172px;box-shadow:var(--kv-shadow)}
.kv-city-menu[hidden]{display:none}
.kv-city-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:10px 12px;border-radius:9px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit}
.kv-city-menu button:hover{background:var(--panel)}.kv-city-menu button.on{color:var(--mint)}
#lang{position:relative}#lang .kv-city-menu{left:auto;right:0;min-width:150px}
.kv-theme{border:1px solid var(--line);background:transparent;color:var(--mut);width:34px;height:31px;border-radius:9px;font-size:14px;cursor:pointer}
.kv-theme:hover{color:var(--mint);border-color:var(--mint)}
.cartbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:9px 15px;border-radius:99px;font-weight:700;font-size:13.5px;cursor:pointer}
.cartbtn svg{width:15px;height:15px}.cartbtn b{color:var(--mint)}
@media(max-width:640px){.cart-label{display:none}.logo-text{display:none}}

.hero{padding:60px 0 34px;text-align:left;position:relative}
.hero h1{font-size:clamp(34px,6vw,64px);font-weight:800;line-height:1.04;letter-spacing:-.02em}
.hero h1 span{background:linear-gradient(100deg,var(--mint),var(--cyan) 50%,var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;background-size:200% auto;animation:sheen 6s linear infinite}
@keyframes sheen{to{background-position:200% center}}
.hero p{color:var(--mut);font-size:16px;margin:16px 0 6px;max-width:500px;line-height:1.6}
.hero .puff{display:inline-block;margin-top:16px;font-size:13px;color:var(--mint);border:1px solid var(--line);border-radius:99px;padding:7px 15px;background:rgba(95,243,208,.06)}

.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:22px 0 18px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--mut);padding:9px 15px;border-radius:99px;cursor:pointer;font-size:13px;font-weight:600;transition:.18s}
.chip:hover{color:var(--txt);border-color:var(--mint)}
.chip.on{background:linear-gradient(100deg,var(--mint),var(--cyan));border-color:transparent;color:#04120e;box-shadow:0 6px 20px rgba(95,243,208,.3)}
.search{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--line);border-radius:99px;color:var(--txt);padding:11px 18px;font-family:inherit;font-size:14px;outline:none}
.search:focus{border-color:var(--mint)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding-bottom:80px}
.card{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(14px);animation:rise .5s forwards;transition:transform .22s,border-color .22s,box-shadow .22s}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-5px);border-color:var(--mint);box-shadow:0 18px 40px rgba(0,0,0,.45),0 0 26px rgba(95,243,208,.16)}
.card.is-out{opacity:.5}
.ph{position:relative;aspect-ratio:1/1;background:#fff;display:grid;place-items:center;overflow:hidden}
.ph span{font-family:'Space Grotesk';font-size:42px;font-weight:800;color:#dfe6e6}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.card:hover .ph img{transform:scale(1.05)}
.ph img{transition:transform .4s}
.cbody{padding:13px 15px 15px;display:flex;flex-direction:column;gap:8px}
.ccat{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);font-weight:700}
.cname{font-weight:700;font-size:15px;line-height:1.3}
.cmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
.cprice{font-family:'Space Grotesk';font-weight:700;font-size:15px}
.cprice small{color:var(--mut);font-weight:500;font-size:11px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.pill.in{background:rgba(95,243,208,.12);color:var(--mint)}
.pill.new{background:rgba(101,223,255,.14);color:var(--cyan)}
.pill.out{background:rgba(255,106,134,.12);color:var(--red)}
.empty{grid-column:1/-1;color:var(--mut);padding:40px 0;text-align:center}

footer{border-top:1px solid var(--line);padding:28px 0 44px;color:var(--mut);font-size:13px;line-height:1.9;position:relative;z-index:1}
footer a{color:var(--mint);text-decoration:none}
.age18{border:1px solid var(--red);color:var(--red);border-radius:7px;padding:2px 8px;font-weight:800;margin-right:8px}
@media(prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none}.hero h1 span{animation:none}}
</style>
</head>
<body>
<canvas id="vapor"></canvas>

<header>
  <div class="wrap nav">
    <div class="nav-l">
      <a class="logo" href="#"><span class="logo-badge"><img id="logoImg" src="../../../data/photos/cat.png" alt=""></span><span class="logo-text">KATO<em>VAPE</em></span></a>
      <div id="city"></div>
    </div>
    <div class="nav-r">
      <div id="lang"></div>
      <div id="theme"></div>
      <div id="profile"></div>
      <button class="cartbtn" id="cartFab" onclick="KV.openCart()"></button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <h1 id="heroT"></h1>
    <p id="heroP"></p>
    <span class="puff" id="heroPuff"></span>
  </section>
  <div id="filters" style="display:inline-block"></div>
  <div id="app"></div>
</main>

<footer id="contact">
  <div class="wrap">
    <p><span class="age18">18+</span><span id="fAdult"></span></p>
    <p><span id="fPickup"></span> · <span id="fPay"></span></p>
    <p><span id="fWrite"></span>: <a href="https://t.me/KatoManager" target="_blank" rel="noopener">@KatoManager</a> · KatoVape 2026</p>
  </div>
</footer>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../../../shared/config.js?v=2"></script>
<script src="../../../shared/core.js?v=14"></script>
<script src="../../../shared/auth.js?v=3"></script>
<script>
// живой дымный фон на canvas: несколько мягких клубов пара поднимаются вверх.
// дёшево (около 40 радиальных градиентов на кадр), уважает prefers-reduced-motion.
(function(){
  const cv=document.getElementById('vapor'), ctx=cv.getContext('2d');
  let W,H,parts,raf; const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const HUES=['95,243,208','101,223,255','157,139,255'];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  function mk(any){ return { x:Math.random()*W, y:any?Math.random()*H:H+80, r:70+Math.random()*140,
    v:.25+Math.random()*.6, a:.05+Math.random()*.07, hue:HUES[(Math.random()*HUES.length)|0] }; }
  function frame(){ ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
    for(const p of parts){ p.y-=p.v; p.x+=Math.sin(p.y*.008)*.35; if(p.y<-p.r) Object.assign(p,mk(false));
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      g.addColorStop(0,'rgba('+p.hue+','+p.a+')'); g.addColorStop(1,'rgba('+p.hue+',0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.29); ctx.fill(); }
    raf=requestAnimationFrame(frame); }
  function start(){ resize(); parts=Array.from({length:38},()=>mk(true));
    if(reduce){ frame(); cancelAnimationFrame(raf); frame(); } else frame(); }
  addEventListener('resize',resize);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else if(!reduce) frame(); });
  start();
})();
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/plain" id="vaporApp">
const { useState, useEffect, useMemo } = React;
const HERO = {
  ru:{ t:'Пар, что <span>оживает</span>', p:'Тот же каталог KatoVape, но интерфейс дышит. Наведи, нажми, выбери вкус.', puff:'живой дымный фон' },
  uk:{ t:'Пара, що <span>оживає</span>', p:'Той самий каталог KatoVape, але інтерфейс дихає. Наведи, натисни, обери смак.', puff:'живий димний фон' },
  pl:{ t:'Para, która <span>ożywa</span>', p:'Ten sam katalog KatoVape, ale interfejs oddycha. Najedź, kliknij, wybierz smak.', puff:'żywe dymne tło' }
};
const CART_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M3 4h2l2.6 11.2a1.5 1.5 0 0 0 1.5 1.1h7.9a1.5 1.5 0 0 0 1.5-1.2L20 8H6"/></svg>';

function App(){
  const [tick,setTick]=useState(0);
  const [ready,setReady]=useState(false);
  const [cat,setCat]=useState('all');
  const [q,setQ]=useState('');

  useEffect(()=>{
    KV.init({
      render(){ paintChrome(); setTick(t=>t+1); },
      cart(){ const n=KV.cartCount(); const b=document.getElementById('cartFab');
        b.innerHTML=CART_ICON+'<span class="cart-label">'+KV.t('cart')+'</span>'+(n?'<b>'+n+'</b>':''); },
      fail(){ setReady(true); }
    });
    KV.autoHideHeader(document.querySelector('header'));
    setReady(true);
  },[]);

  function paintChrome(){
    const L=(HERO[KV.lang]||HERO.ru);
    const set=(id,html)=>{ const e=document.getElementById(id); if(e) e.innerHTML=html; };
    set('heroT',L.t); document.getElementById('heroP').textContent=L.p;
    document.getElementById('heroPuff').textContent='✦ '+L.puff;
    document.getElementById('fAdult').textContent=KV.t('adult');
    document.getElementById('fPickup').textContent=KV.pickup();
    document.getElementById('fPay').textContent=KV.t('pay');
    document.getElementById('fWrite').textContent=KV.t('write');
    document.getElementById('logoImg').src=KV.cityLogo();
  }

  const rows=useMemo(()=>{
    if(!ready || !KV.db) return [];
    const out=[];
    for(const c of KV.db.categories){
      if(cat!=='all' && c.id!==cat) continue;
      for(const it of KV.sortItems(c.items)){
        if(!KV.filterPass(it)) continue;
        if(!KV.match(it, q.trim().toLowerCase())) continue;
        out.push({it, st:KV.status(it), cname:KV.catName(c)});
      }
    }
    return out;
  },[tick,ready,cat,q]);

  const cats = ready && KV.db ? [{id:'all',name:null},...KV.db.categories] : [{id:'all',name:null}];
  const label = c => c.name ? KV.catName(c) : ({ru:'Все',uk:'Всі',pl:'Wszystko'}[KV.lang]||'Все');

  return (
    <React.Fragment>
      <div className="bar">
        <div className="chips">
          {cats.map(c=>(
            <button key={c.id} className={'chip'+(c.id===cat?' on':'')} onClick={()=>setCat(c.id)}>{label(c)}</button>
          ))}
        </div>
        <input className="search" placeholder={ready?KV.t('search'):''} value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="grid">
        {rows.length===0 && <div className="empty">{ready?KV.t('empty'):'…'}</div>}
        {rows.map((r,i)=>(
          <div key={r.it.id} className={'card'+(r.st==='out'?' is-out':'')} style={{animationDelay:(Math.min(i,12)*28)+'ms'}}
               onClick={()=>KV.openProduct(r.it.id)}>
            <div className="ph">
              <span>{(r.it.name.match(/[A-Za-zА-Яа-я]/)||['?'])[0]}</span>
              <img src={'../../../data/photos/'+r.it.id+'.jpg'} alt="" loading="lazy" onError={e=>e.target.remove()}/>
            </div>
            <div className="cbody">
              <span className="ccat">{r.cname}</span>
              <span className="cname">{r.it.name}</span>
              <span dangerouslySetInnerHTML={{__html:KV.badgesHTML(r.it)}}/>
              <div className="cmeta">
                <span className="cprice">{KV.price(r.it)}{r.it.tiers?<small> {({ru:'от',uk:'від',pl:'od'}[KV.lang]||'от')} {r.it.tiers[r.it.tiers.length-1].p} zł</small>:null}</span>
                <span className={'pill '+r.st}>{KV.t(r.st==='in'?'in':r.st==='new'?'new':'out')}</span>
              </div>
              <span dangerouslySetInnerHTML={{__html:KV.starsHTML(r.it)}}/>
            </div>
          </div>
        ))}
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
<script>
// компилируем JSX в classic-runtime (React.createElement) и запускаем.
// авто-режим babel тянул import "react/jsx-runtime", который без сборщика не грузится.
(function(){
  var src=document.getElementById('vaporApp').textContent;
  var code=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
  (0, eval)(code);
})();
</script>
</body>
</html>

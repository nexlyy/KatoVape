<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KatoVape · Vapor</title>
<link rel="icon" type="image/png" href="../../../data/photos/cat.png">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10; --panel:#0f141b; --panel2:#141b24; --line:#222c38;
  --mint:#5ff3d0; --cyan:#65dfff; --violet:#9d8bff; --red:#ff6a86;
  --txt:#e9f2f4; --mut:#8593a1;
  --kv-surface:var(--panel); --kv-surface2:var(--panel2); --kv-line:var(--line);
  --kv-text:var(--txt); --kv-muted:var(--mut); --kv-field:#0c1119;
  --kv-accent:var(--mint); --kv-accent-2:var(--mint); --kv-accent-ink:#04120e;
  --kv-radius:14px; --kv-shadow:0 18px 44px rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:Sora,system-ui,sans-serif;padding-bottom:92px;overflow-x:hidden}
#vapor{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.9}
button{font-family:inherit}
.top{position:relative;z-index:1;padding:16px 16px 8px;display:flex;align-items:center;gap:10px}
.cat-ico{width:40px;height:40px;border-radius:50%;overflow:hidden;background:#fff;box-shadow:0 0 0 1px var(--line),0 0 18px rgba(95,243,208,.3)}
.cat-ico img{width:100%;height:100%;object-fit:cover;transform:scale(1.7);transform-origin:50% 38%}
.top h1{font-family:'Space Grotesk';font-size:17px;font-weight:800}
.top h1 em{font-style:normal;background:linear-gradient(100deg,var(--mint),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.top .upd{font-size:11px;color:var(--mut)}
#lang{position:relative;margin-left:auto}#lang .kv-city{padding:8px 12px;font-size:12px}
#lang .kv-city-menu{left:auto;right:0;min-width:150px}
.sticky{position:sticky;top:0;z-index:10;background:rgba(8,11,16,.82);backdrop-filter:blur(12px);padding:8px 16px 10px}
#city{position:relative;margin-bottom:8px}
.kv-city{display:flex;align-items:center;gap:7px;width:100%;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:11px 14px;border-radius:13px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.kv-city-pin{color:var(--mint);font-size:9px}.kv-city-car{color:var(--mut);font-size:11px;margin-left:auto}
.kv-city-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:var(--kv-shadow)}
.kv-city-menu[hidden]{display:none}
.kv-city-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:11px 12px;border-radius:9px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit}
.kv-city-menu button.on{color:var(--mint)}
.srow{display:flex;gap:8px}
.search{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:13px;color:var(--txt);padding:11px 14px;font-family:inherit;font-size:14px;outline:none}
.search:focus{border-color:var(--mint)}
.cartbtn{border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:0 14px;border-radius:13px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.cartbtn b{color:var(--mint)}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-top:10px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--mut);padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
.chip.on{background:linear-gradient(100deg,var(--mint),var(--cyan));border-color:transparent;color:#04120e}
.sec{position:relative;z-index:1;padding:14px 16px 4px}
.sec h2{font-family:'Space Grotesk';font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
.sec h2 b{color:var(--mint)}
.row{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:15px;margin-bottom:9px;overflow:hidden;opacity:0;transform:translateY(10px);animation:rise .45s forwards}
@keyframes rise{to{opacity:1;transform:none}}
.row.is-out{opacity:.5}
.rhead{display:flex;align-items:center;gap:11px;padding:11px 12px;cursor:pointer}
.ph{position:relative;width:46px;height:46px;border-radius:12px;overflow:hidden;background:#fff;display:grid;place-items:center;flex-shrink:0}
.ph span{font-family:'Space Grotesk';font-size:17px;font-weight:800;color:#dfe6e6}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.rmain{flex:1;min-width:0}
.rname{font-weight:700;font-size:14px;line-height:1.3}
.rsub{font-size:11.5px;color:var(--mut);margin-top:2px}
.rsub b{color:var(--txt)}
.rsub .from{color:var(--mint)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.in{background:var(--mint);box-shadow:0 0 10px var(--mint)}
.dot.new{background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.dot.out{background:var(--red)}
.empty{padding:30px 16px;color:var(--mut);text-align:center;position:relative;z-index:1}
.cta{position:fixed;left:16px;right:16px;bottom:16px;background:linear-gradient(100deg,var(--mint),var(--cyan));color:#04120e;text-align:center;border:none;font-weight:800;font-family:'Space Grotesk';font-size:14px;padding:16px;border-radius:15px;box-shadow:0 12px 30px rgba(95,243,208,.35);cursor:pointer;z-index:20}
@media(prefers-reduced-motion:reduce){.row{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="vapor"></canvas>

<div class="top">
  <div class="cat-ico"><img id="logoImg" src="../../../data/photos/cat.png" alt="" onerror="this.style.display='none'"></div>
  <div><h1>KATO<em>VAPE</em></h1><div class="upd" id="upd"></div></div>
  <div id="lang"></div>
  <div id="profile"></div>
</div>
<div class="sticky">
  <div id="city"></div>
  <div class="srow">
    <input class="search" id="q" type="search">
    <button class="cartbtn" id="cartFab" onclick="KV.openCart()"></button>
  </div>
  <div class="chips" id="chips"></div>
</div>
<div id="app"></div>
<button class="cta" id="cta"></button>

<script src="../../../shared/config.js?v=2"></script>
<script src="../../../shared/core.js?v=14"></script>
<script src="../../../shared/auth.js?v=3"></script>
<script>
(function(){
  const cv=document.getElementById('vapor'), ctx=cv.getContext('2d');
  let W,H,parts,raf; const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const HUES=['95,243,208','101,223,255','157,139,255'];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  function mk(any){ return { x:Math.random()*W, y:any?Math.random()*H:H+70, r:60+Math.random()*120,
    v:.22+Math.random()*.5, a:.05+Math.random()*.06, hue:HUES[(Math.random()*HUES.length)|0] }; }
  function frame(){ ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
    for(const p of parts){ p.y-=p.v; p.x+=Math.sin(p.y*.008)*.3; if(p.y<-p.r) Object.assign(p,mk(false));
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      g.addColorStop(0,'rgba('+p.hue+','+p.a+')'); g.addColorStop(1,'rgba('+p.hue+',0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.29); ctx.fill(); }
    raf=requestAnimationFrame(frame); }
  addEventListener('resize',resize);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) cancelAnimationFrame(raf); else if(!reduce) frame(); });
  resize(); parts=Array.from({length:30},()=>mk(true)); frame();
})();
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/plain" id="vaporApp">
const { useState, useEffect, useMemo } = React;
const tg = window.Telegram && window.Telegram.WebApp;
const inTg = !!(tg && tg.initData);
if (inTg) {
  tg.ready(); tg.expand(); tg.setHeaderColor('#080b10'); tg.setBackgroundColor('#080b10');
  tg.BackButton.onClick(()=>history.back()); tg.BackButton.show();
}
function App(){
  const [tick,setTick]=useState(0); const [ready,setReady]=useState(false);
  const [cat,setCat]=useState('all'); const [q,setQ]=useState('');
  useEffect(()=>{
    const qi=document.getElementById('q');
    qi.addEventListener('input',e=>setQ(e.target.value));
    KV.init({ app:true, render(){ chrome(); setTick(t=>t+1); }, cart:cartHook, fail(){ setReady(true); } });
    setReady(true);
  },[]);
  function chrome(){ document.getElementById('upd').textContent=KV.t('updated')+' '+KV.fmtDate(KV.db.updated);
    document.getElementById('q').placeholder=KV.t('search'); document.getElementById('logoImg').src=KV.cityLogo();
    const cs=[{id:'all',name:null},...KV.db.categories];
    document.getElementById('chips').innerHTML=cs.map(c=>'<button class="chip'+(c.id===cat?' on':'')+'" data-c="'+c.id+'">'+
      (c.name?KV.catName(c):({ru:'Все',uk:'Всі',pl:'Wszystko'}[KV.lang]))+'</button>').join('');
  }
  function cartHook(){ const n=KV.cartCount(); document.getElementById('cartFab').innerHTML=KV.t('cart')+(n?' <b>'+n+'</b>':'');
    const cta=document.getElementById('cta');
    if(inTg){ tg.MainButton.setParams({text:n?KV.t('cart')+' ('+n+') · '+KV.cartTotal()+' zł':KV.t('write'),color:'#5ff3d0',text_color:'#04120e'}); tg.MainButton.show();
      tg.MainButton.onClick(()=>{ if(KV.cartCount()) KV.openCart(); else tg.openTelegramLink(KV.manager); }); cta.style.display='none'; document.body.style.paddingBottom='20px'; }
    else { cta.textContent=n?KV.t('cart')+' ('+n+') · '+KV.cartTotal()+' zł':KV.t('write'); cta.onclick=()=>{ if(KV.cartCount()) KV.openCart(); else window.open(KV.manager,'_blank'); }; }
  }
  document.getElementById('chips').onclick=e=>{ const b=e.target.closest('.chip'); if(b){ setCat(b.dataset.c); } };

  const groups=useMemo(()=>{
    if(!ready||!KV.db) return [];
    const g=[];
    for(const c of KV.db.categories){
      if(cat!=='all'&&c.id!==cat) continue;
      const items=KV.sortItems(c.items).filter(i=>KV.match(i,q.trim().toLowerCase()));
      if(!items.length) continue;
      g.push({c,items,have:items.filter(i=>KV.status(i)!=='out').length});
    }
    return g;
  },[tick,ready,cat,q]);

  return (
    <React.Fragment>
      {groups.length===0 && <div className="empty">{ready?KV.t('empty'):'…'}</div>}
      {groups.map(g=>(
        <div className="sec" key={g.c.id}>
          <h2>{KV.catName(g.c)} <b>{g.have}/{g.items.length}</b></h2>
          {g.items.map((i,idx)=>{ const st=KV.status(i); return (
            <div className={'row'+(st==='out'?' is-out':'')} key={i.id} style={{animationDelay:(Math.min(idx,10)*26)+'ms'}} onClick={()=>KV.openProduct(i.id)}>
              <div className="rhead">
                <div className="ph"><span>{(i.name.match(/[A-Za-zА-Яа-я]/)||['?'])[0]}</span>
                  <img src={'../../../data/photos/'+i.id+'.jpg'} alt="" loading="lazy" onError={e=>e.target.remove()}/></div>
                <div className="rmain">
                  <div className="rname">{i.name}</div>
                  <div className="rsub"><b>{KV.price(i)}</b>{i.tiers?<span className="from"> {({ru:'от',uk:'від',pl:'od'}[KV.lang])} {i.tiers[i.tiers.length-1].p} zł</span>:null}
                    {st!=='out'?' · '+KV.qty(i)+' '+KV.t('pcs'):' · '+KV.t('out')}{st==='new'?' · '+KV.t('new'):''}</div>
                </div>
                <span className={'dot '+st}></span>
              </div>
            </div>
          );})}
        </div>
      ))}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
<script>
(function(){ var src=document.getElementById('vaporApp').textContent;
  var code=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code; (0,eval)(code); })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KatoVape · Vapor</title>
<link rel="icon" type="image/png" href="../../../data/photos/cat.png">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10; --panel:#0f141b; --panel2:#141b24; --line:#222c38;
  --mint:#5ff3d0; --cyan:#65dfff; --violet:#9d8bff; --red:#ff6a86;
  --txt:#e9f2f4; --mut:#8593a1;
  --kv-surface:var(--panel); --kv-surface2:var(--panel2); --kv-line:var(--line);
  --kv-text:var(--txt); --kv-muted:var(--mut); --kv-field:#0c1119;
  --kv-accent:var(--mint); --kv-accent-2:var(--mint); --kv-accent-ink:#04120e;
  --kv-radius:14px; --kv-shadow:0 18px 44px rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Hanken Grotesk',system-ui,sans-serif;padding-bottom:92px;overflow-x:hidden}
#vapor{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:1}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 70% at 50% 116%,rgba(95,243,208,.09),transparent 60%),radial-gradient(90% 55% at 88% -8%,rgba(101,225,255,.06),transparent 55%)}
.top,.sticky,#app,.cta{position:relative;z-index:1}
button{font-family:inherit}
.top{position:relative;z-index:1;padding:16px 16px 8px;display:flex;align-items:center;gap:10px}
.cat-ico{width:40px;height:40px;border-radius:50%;overflow:hidden;background:#fff;box-shadow:0 0 0 1px var(--line),0 0 18px rgba(95,243,208,.3)}
.cat-ico img{width:100%;height:100%;object-fit:cover;transform:scale(1.7);transform-origin:50% 38%}
.top h1{font-family:'Clash Display';font-size:17px;font-weight:800}
.top h1 em{font-style:normal;color:var(--mint)}
.top .upd{font-size:11px;color:var(--mut)}
#lang{position:relative;margin-left:auto}#lang .kv-city{padding:8px 12px;font-size:12px}
#lang .kv-city-menu{left:auto;right:0;min-width:150px}
.sticky{position:sticky;top:0;z-index:10;background:rgba(8,11,16,.82);backdrop-filter:blur(12px);padding:8px 16px 10px}
#city{position:relative;margin-bottom:8px}
.kv-city{display:flex;align-items:center;gap:7px;width:100%;border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:11px 14px;border-radius:13px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.kv-city-pin{color:var(--mint);font-size:9px}.kv-city-car{color:var(--mut);font-size:11px;margin-left:auto}
.kv-city-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:var(--kv-shadow)}
.kv-city-menu[hidden]{display:none}
.kv-city-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:11px 12px;border-radius:9px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit}
.kv-city-menu button.on{color:var(--mint)}
.srow{display:flex;gap:8px}
.search{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:13px;color:var(--txt);padding:11px 14px;font-family:inherit;font-size:14px;outline:none}
.search:focus{border-color:var(--mint)}
.cartbtn{border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:0 14px;border-radius:13px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.cartbtn b{color:var(--mint)}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-top:10px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--mut);padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer}
.chip.on{background:linear-gradient(100deg,var(--mint),var(--cyan));border-color:transparent;color:#04120e}
.sec{position:relative;z-index:1;padding:14px 16px 4px}
.sec h2{font-family:'Clash Display';font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
.sec h2 b{color:var(--mint)}
.row{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:15px;margin-bottom:9px;overflow:hidden;opacity:0;transform:translateY(10px);animation:rise .45s forwards}
@keyframes rise{to{opacity:1;transform:none}}
.row.is-out{opacity:.5}
.rhead{display:flex;align-items:center;gap:11px;padding:11px 12px;cursor:pointer}
.ph{position:relative;width:46px;height:46px;border-radius:12px;overflow:hidden;background:#fff;display:grid;place-items:center;flex-shrink:0}
.ph span{font-family:'Clash Display';font-size:17px;font-weight:800;color:#dfe6e6}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.rmain{flex:1;min-width:0}
.rname{font-weight:700;font-size:14px;line-height:1.3}
.rsub{font-size:11.5px;color:var(--mut);margin-top:2px}
.rsub b{color:var(--txt)}
.rsub .from{color:var(--mint)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.in{background:var(--mint);box-shadow:0 0 10px var(--mint)}
.dot.new{background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.dot.out{background:var(--red)}
.empty{padding:30px 16px;color:var(--mut);text-align:center;position:relative;z-index:1}
.cta{position:fixed;left:16px;right:16px;bottom:16px;background:linear-gradient(100deg,var(--mint),var(--cyan));color:#04120e;text-align:center;border:none;font-weight:800;font-family:'Clash Display';font-size:14px;padding:16px;border-radius:15px;box-shadow:0 12px 30px rgba(95,243,208,.35);cursor:pointer;z-index:20}
@media(prefers-reduced-motion:reduce){.row{animation:none;opacity:1;transform:none}}
/* корзина (нижний лист) и тост */
.kvd{position:fixed;inset:0;z-index:90;background:rgba(4,7,11,.72)}
.kvd[hidden]{display:none}
.kvd-box{position:absolute;left:0;right:0;bottom:0;max-height:82vh;background:var(--panel2);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:20px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;box-shadow:0 -14px 40px rgba(0,0,0,.5)}
.kvd-head{display:flex;align-items:center;justify-content:space-between}
.kvd-title{font-family:'Clash Display';font-size:16px;font-weight:700}
.kvd-x{border:none;background:none;color:var(--mut);font-size:24px;cursor:pointer}
.kvd-items{display:flex;flex-direction:column}
.kvd-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px}
.kvd-name{flex:1;font-weight:700}.kvd-name small{display:block;color:var(--mut);font-weight:400}
.kvd-ctr{display:flex;align-items:center;gap:7px}
.kvd-ctr button{width:25px;height:25px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--txt);cursor:pointer}
.kvd-sum{color:var(--mint);font-weight:800;min-width:48px;text-align:right;font-size:12.5px}
.kvd-empty{color:var(--mut)}
.kvd-total{font-family:'Clash Display';font-size:14px;font-weight:700}
.kvd-total s{color:var(--mut);font-weight:400;margin-right:6px}
.kvd-go{background:linear-gradient(100deg,var(--mint),var(--cyan));color:#04120e;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:13px;cursor:pointer}
.kvd-clear{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer}
.kv-toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);background:linear-gradient(100deg,var(--mint),var(--cyan));color:#04120e;font-weight:800;font-size:12.5px;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:120;max-width:90vw;text-align:center}
.kv-toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<canvas id="vapor"></canvas>

<div class="top">
  <div class="cat-ico"><img id="logoImg" src="../../../data/photos/cat.png" alt="" onerror="this.style.display='none'"></div>
  <div><h1>KATO<em>VAPE</em></h1><div class="upd" id="upd"></div></div>
  <div id="lang"></div>
  <div id="profile"></div>
</div>
<div class="sticky">
  <div id="city"></div>
  <div class="srow">
    <input class="search" id="q" type="search">
    <button class="cartbtn" id="cartFab" onclick="KV.openCart()"></button>
  </div>
  <div class="chips" id="chips"></div>
</div>
<div id="app"></div>
<button class="cta" id="cta"></button>

<script src="../../../shared/config.js?v=3"></script>
<script src="../../../shared/core.js?v=16"></script>
<script src="../../../shared/auth.js?v=5"></script>
<script>
// живой дым: дрейфующее fBm-поле шума (тайлящаяся текстура печётся один раз).
(function(){
  const cv=document.getElementById('vapor'); if(!cv) return;
  const ctx=cv.getContext('2d'); if(!ctx) return;
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W,H,raf;
  const N=512, tex=document.createElement('canvas'); tex.width=tex.height=N;
  (function bake(){
    const raw=document.createElement('canvas'); raw.width=raw.height=N;
    const rg=raw.getContext('2d'), img=rg.createImageData(N,N), sm=x=>x*x*(3-2*x);
    function oct(p){ const a=new Float32Array(p*p); for(let i=0;i<a.length;i++) a[i]=Math.random(); return {a,p}; }
    const O=[oct(4),oct(8),oct(16),oct(32),oct(64)], A=[.5,.27,.15,.09,.05];
    function s(o,u,v){ const p=o.p, fu=u*p, fv=v*p, x0=Math.floor(fu)%p, y0=Math.floor(fv)%p,
      x1=(x0+1)%p, y1=(y0+1)%p, tx=sm(fu-Math.floor(fu)), ty=sm(fv-Math.floor(fv)),
      a=o.a[y0*p+x0], b=o.a[y0*p+x1], c=o.a[y1*p+x0], d=o.a[y1*p+x1];
      return (a*(1-tx)+b*tx)*(1-ty)+(c*(1-tx)+d*tx)*ty; }
    for(let y=0;y<N;y++) for(let x=0;x<N;x++){
      let v=0,u=x/N,w=y/N; for(let k=0;k<O.length;k++) v+=A[k]*s(O[k],u,w);
      v=Math.min(1,Math.max(0,(v-0.47)/0.42)); v=Math.pow(v*v*(3-2*v),1.15);
      const i=(y*N+x)*4; img.data[i]=226; img.data[i+1]=247; img.data[i+2]=251; img.data[i+3]=v*235; }
    rg.putImageData(img,0,0);
    const g=tex.getContext('2d'); g.filter='blur(3px)';
    for(let i=-1;i<=1;i++) for(let j=-1;j<=1;j++) g.drawImage(raw,i*N,j*N);
    g.filter='none';
  })();
  const pat=ctx.createPattern(tex,'repeat');
  const canMatrix=typeof DOMMatrix!=='undefined' && pat && pat.setTransform;
  const L=[ {sc:3.0,sx:4,sy:8,wob:22,a:.56}, {sc:1.9,sx:-6,sy:13,wob:34,a:.38}, {sc:1.2,sx:3,sy:19,wob:46,a:.24} ];
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  function layer(l,i,t){ if(canMatrix){ const m=new DOMMatrix();
      m.translateSelf(t*0.001*l.sx + Math.sin(t*0.00016+i*2.1)*l.wob, -t*0.001*l.sy).scaleSelf(l.sc); pat.setTransform(m); }
    ctx.globalAlpha=l.a; ctx.globalCompositeOperation='screen'; ctx.fillStyle=pat; ctx.fillRect(0,0,W,H); }
  function draw(t){ ctx.setTransform(1,0,0,1,0,0); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,W,H);
    for(let i=0;i<L.length;i++) layer(L[i],i,t);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='destination-in';
    const gr=ctx.createLinearGradient(0,0,0,H);
    gr.addColorStop(0,'rgba(0,0,0,.04)'); gr.addColorStop(.4,'rgba(0,0,0,.15)');
    gr.addColorStop(.72,'rgba(0,0,0,.42)'); gr.addColorStop(1,'rgba(0,0,0,.8)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; }
  function loop(t){ draw(t); raf=requestAnimationFrame(loop); }
  resize(); if(reduce) draw(9000); else loop(0);
  addEventListener('resize',()=>{ resize(); if(reduce) draw(9000); });
  document.addEventListener('visibilitychange',()=>{ if(document.hidden){ cancelAnimationFrame(raf); raf=0; } else if(!reduce&&!raf) loop(performance.now()); });
})();
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/plain" id="vaporApp">
const { useState, useEffect, useMemo } = React;
const tg = window.Telegram && window.Telegram.WebApp;
const inTg = !!(tg && tg.initData);
if (inTg) {
  tg.ready(); tg.expand(); tg.setHeaderColor('#080b10'); tg.setBackgroundColor('#080b10');
  tg.BackButton.onClick(()=>history.back()); tg.BackButton.show();
}
function App(){
  const [tick,setTick]=useState(0); const [ready,setReady]=useState(false);
  const [cat,setCat]=useState('all'); const [q,setQ]=useState('');
  useEffect(()=>{
    const qi=document.getElementById('q');
    qi.addEventListener('input',e=>setQ(e.target.value));
    KV.init({ app:true, render(){ chrome(); setTick(t=>t+1); }, cart:cartHook, fail(){ setReady(true); } });
    setReady(true);
  },[]);
  function chrome(){ document.getElementById('upd').textContent=KV.t('updated')+' '+KV.fmtDate(KV.db.updated);
    document.getElementById('q').placeholder=KV.t('search'); document.getElementById('logoImg').src=KV.cityLogo();
    const cs=[{id:'all',name:null},...KV.db.categories];
    document.getElementById('chips').innerHTML=cs.map(c=>'<button class="chip'+(c.id===cat?' on':'')+'" data-c="'+c.id+'">'+
      (c.name?KV.catName(c):({ru:'Все',uk:'Всі',pl:'Wszystko'}[KV.lang]))+'</button>').join('');
  }
  function cartHook(){ const n=KV.cartCount(); document.getElementById('cartFab').innerHTML=KV.t('cart')+(n?' <b>'+n+'</b>':'');
    const cta=document.getElementById('cta');
    if(inTg){ tg.MainButton.setParams({text:n?KV.t('cart')+' ('+n+') · '+KV.cartTotal()+' zł':KV.t('write'),color:'#5ff3d0',text_color:'#04120e'}); tg.MainButton.show();
      tg.MainButton.onClick(()=>{ if(KV.cartCount()) KV.openCart(); else tg.openTelegramLink(KV.manager); }); cta.style.display='none'; document.body.style.paddingBottom='20px'; }
    else { cta.textContent=n?KV.t('cart')+' ('+n+') · '+KV.cartTotal()+' zł':KV.t('write'); cta.onclick=()=>{ if(KV.cartCount()) KV.openCart(); else window.open(KV.manager,'_blank'); }; }
  }
  document.getElementById('chips').onclick=e=>{ const b=e.target.closest('.chip'); if(b){ setCat(b.dataset.c); } };

  const groups=useMemo(()=>{
    if(!ready||!KV.db) return [];
    const g=[];
    for(const c of KV.db.categories){
      if(cat!=='all'&&c.id!==cat) continue;
      const items=KV.sortItems(c.items).filter(i=>KV.match(i,q.trim().toLowerCase()));
      if(!items.length) continue;
      g.push({c,items,have:items.filter(i=>KV.status(i)!=='out').length});
    }
    return g;
  },[tick,ready,cat,q]);

  return (
    <React.Fragment>
      {groups.length===0 && <div className="empty">{ready?KV.t('empty'):'…'}</div>}
      {groups.map(g=>(
        <div className="sec" key={g.c.id}>
          <h2>{KV.catName(g.c)} <b>{g.have}/{g.items.length}</b></h2>
          {g.items.map((i,idx)=>{ const st=KV.status(i); return (
            <div className={'row'+(st==='out'?' is-out':'')} key={i.id} style={{animationDelay:(Math.min(idx,10)*26)+'ms'}} onClick={()=>KV.openProduct(i.id)}>
              <div className="rhead">
                <div className="ph"><span>{(i.name.match(/[A-Za-zА-Яа-я]/)||['?'])[0]}</span>
                  <img src={'../../../data/photos/'+i.id+'.jpg'} alt="" loading="lazy" onError={e=>e.target.remove()}/></div>
                <div className="rmain">
                  <div className="rname">{i.name}</div>
                  <div className="rsub"><b>{KV.price(i)}</b>{i.tiers?<span className="from"> {({ru:'от',uk:'від',pl:'od'}[KV.lang])} {i.tiers[i.tiers.length-1].p} zł</span>:null}
                    {st!=='out'?' · '+KV.qty(i)+' '+KV.t('pcs'):' · '+KV.t('out')}{st==='new'?' · '+KV.t('new'):''}</div>
                </div>
                <span className={'dot '+st}></span>
              </div>
            </div>
          );})}
        </div>
      ))}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
<script>
(function(){ var src=document.getElementById('vaporApp').textContent;
  var code=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code; (0,eval)(code); })();
</script>
</body>
</html>
